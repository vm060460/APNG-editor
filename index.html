      opacity: ['opacity'], rotate: ['rotate'], translate: ['translateX', 'translateY'],
      scale: ['scale'], color: ['hue', 'saturation', 'brightness', 'contrast', 'invert']
    };

    const TRACKS_INFO = [
      { id: 'opacity', labelKey: 'opacity', color: 'bg-purple-400', border: 'border-purple-600', stroke: '#c084fc' },
      { id: 'scale', labelKey: 'scale', color: 'bg-pink-400', border: 'border-pink-600', stroke: '#f472b6' },

      { id: 'translate', labelKey: 'translate', color: 'bg-blue-400', border: 'border-blue-600', stroke: '#60a5fa' },
      { id: 'color', labelKey: 'color', color: 'bg-orange-400', border: 'border-orange-600', stroke: '#fb923c' }
    ];

    const applyEasing = (p, type) => {
      if (type === 'easeIn') return p * p;
      if (type === 'easeOut') return 1 - Math.pow(1 - p, 2);
      if (type === 'easeInOut') return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
      return p; 
    };

        Object.keys(params).forEach(p => { text = text.replace(`{${p}}`, params[p]); });
        return text;
      }, [lang]);

      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');

      const [isAppReady, setIsAppReady] = useState(false);
      const [frames, setFrames] = useState([]);
      const [originalFileName, setOriginalFileName] = useState('edited_animation');
      
      const [currentFrameIndex, setCurrentFrameIndex] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isLooping, setIsLooping] = useState(false);

      // 全域狀態
      const [globalOpacity, setGlobalOpacity] = useState(1.0);
      const [globalHue, setGlobalHue] = useState(0);
      const [globalSaturation, setGlobalSaturation] = useState(100);
      const [globalBrightness, setGlobalBrightness] = useState(100);
      const [globalContrast, setGlobalContrast] = useState(100);
      const [globalInvert, setGlobalInvert] = useState(0);
      const [globalFlipX, setGlobalFlipX] = useState(false);
      const [globalFlipY, setGlobalFlipY] = useState(false);
      const [bgRemoval, setBgRemoval] = useState({ type: 'none', color: '#00ff00', tolerance: 50 });

      const [isCropMode, setIsCropMode] = useState(false);
      const [cropRect, setCropRect] = useState({ x: 0, y: 0, w: 100, h: 100 });
      const cropStartRef = useRef(null);
      
      const [isGridView, setIsGridView] = useState(false);
      const [selectedFrames, setSelectedFrames] = useState([]); 
      const [draggedFrameIdx, setDraggedFrameIdx] = useState(null);
      const [isDragOver, setIsDragOver] = useState(false); 
      const [batchDelayInput, setBatchDelayInput] = useState(100); 

      // 加入時間相關狀態
      const [addSecondsInput, setAddSecondsInput] = useState(1);
      const [addPosition, setAddPosition] = useState('end'); // start or end

      const [gradType, setGradType] = useState('opacity');
      const [gradEasing, setGradEasing] = useState('easeInOut'); 
      const [activeGradEffects, setActiveGradEffects] = useState({ opacity: 'opacity_fadeTo', rotate: 'rotate', translate: 'translate', scale: 'scale', color: 'color' });
      
      const [gradOpacityTarget, setGradOpacityTarget] = useState(0);
      const [gradRotStart, setGradRotStart] = useState(0);
      const [gradRotEnd, setGradRotEnd] = useState(360);
      const [gradMoveStartX, setGradMoveStartX] = useState(0);
      const [gradMoveEndX, setGradMoveEndX] = useState(1000);
      const [gradMoveStartY, setGradMoveStartY] = useState(0);
      const [gradMoveEndY, setGradMoveEndY] = useState(0);
      const [gradScaleStart, setGradScaleStart] = useState(100);
      const [gradScaleEnd, setGradScaleEnd] = useState(150);

      const [exportFormat, setExportFormat] = useState('apng'); // apng, zip-png, zip-jpg, zip-webp
      const [compressionLevel, setCompressionLevel] = useState(0); 
      const [exportScale, setExportScale] = useState(1.0); 
      const [targetSeconds, setTargetSeconds] = useState(2);
      const [convertEffect, setConvertEffect] = useState('none');

      const [history, setHistory] = useState([]);
      const [historyPointer, setHistoryPointer] = useState(-1);
      const isRestoring = useRef(false);
      const chromaCache = useRef({ bgStateStr: '', canvases: [] }); 

      const [isLoading, setIsLoading] = useState(false);
      const [isExporting, setIsExporting] = useState(false);
      const [error, setError] = useState(null);
      
      const canvasRef = useRef(null);
      const overlayRef = useRef(null);
      const timelineTrackRef = useRef(null);
      const currentFrameIndexRef = useRef(0);

      const undoRef = useRef();
      const redoRef = useRef();
      const framesLenRef = useRef();
      const selectedKeyframeRef = useRef(null);

      // 初始化引擎
      useEffect(() => {
        let isMounted = true;
        const initModules = async () => {
          try {
            const dynamicImport = new Function('url', 'return import(url)');
            const gifuctModule = await dynamicImport('https://esm.sh/gifuct-js@2.1.2?bundle');
            const upngModule = await dynamicImport('https://esm.sh/upng-js@2.1.0?bundle');
            const fflateModule = await dynamicImport('https://esm.sh/fflate@0.8.2?bundle');

            parseGIF = gifuctModule.parseGIF || gifuctModule.default?.parseGIF;
            decompressFrames = gifuctModule.decompressFrames || gifuctModule.default?.decompressFrames;
            UPNG = upngModule.default || upngModule;
            fflate = fflateModule;

            if (isMounted) setIsAppReady(true);
          } catch (err) {
            if (isMounted) setError("Engine Load Error");
          }
        };
        initModules();
        return () => { isMounted = false; };
      }, []);

      useEffect(() => { currentFrameIndexRef.current = currentFrameIndex; }, [currentFrameIndex]);
      useEffect(() => { selectedKeyframeRef.current = selectedKeyframe; }, [selectedKeyframe]);

      // 歷史紀錄管理
      const pushInitialState = (newFrames) => {
        const initialState = {
          frames: newFrames.map(f => ({ ...f, customFilters: { ...f.customFilters }, keyframes: { ...f.keyframes }, easings: { ...f.easings } })),
          globals: { globalOpacity: 1.0, globalHue: 0, globalSaturation: 100, globalBrightness: 100, globalContrast: 100, globalInvert: 0, globalFlipX: false, globalFlipY: false, speed: 1.0, bgRemoval: { type: 'none', color: '#00ff00', tolerance: 50 } }
        };
        setHistory([initialState]);
        setHistoryPointer(0);
      };

      useEffect(() => {
        if (frames.length === 0 || isRestoring.current || isCropMode) return;
        const timeout = setTimeout(() => {
          setHistory(prev => {
            const lastState = prev[historyPointer];
            const currentDataStr = JSON.stringify({
              f: frames.map(f => ({ f: f.customFilters, key: f.keyframes, ease: f.easings, delay: f.delay })),
              g: { globalOpacity, globalHue, globalSaturation, globalBrightness, globalContrast, globalInvert, globalFlipX, globalFlipY, speed, bgRemoval }
            });
            const lastDataStr = lastState ? JSON.stringify({
              f: lastState.frames.map(f => ({ f: f.customFilters, key: f.keyframes, ease: f.easings, delay: f.delay })),
              g: lastState.globals

      useEffect(() => {
        if (!isPlaying || frames.length <= 1) return;
        let animationId; let lastTime = performance.now(); let accumulatedTime = 0;

        const loop = (timestamp) => {
          accumulatedTime += (timestamp - lastTime); lastTime = timestamp; let frameChanged = false;
          let targetDelay = frames[currentFrameIndexRef.current].delay / speed;

          while (accumulatedTime >= targetDelay) {
            accumulatedTime -= targetDelay; const nextIndex = currentFrameIndexRef.current + 1;
            
            if (nextIndex >= frames.length) {
              if (isLooping) currentFrameIndexRef.current = 0;
              else { currentFrameIndexRef.current = frames.length - 1; setIsPlaying(false); setCurrentFrameIndex(frames.length - 1); return; }
            } else currentFrameIndexRef.current = nextIndex;
            
            targetDelay = frames[currentFrameIndexRef.current].delay / speed; frameChanged = true;
          }

          if (frameChanged) setCurrentFrameIndex(currentFrameIndexRef.current);
          if (isPlaying) animationId = requestAnimationFrame(loop);
        };
        animationId = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(animationId);
      }, [isPlaying, frames, speed, isLooping]);

      const getFinalRenderFilters = useCallback((allFrames, index) => {
        const raw = getRawInterpolatedFilters(allFrames, index);
        return {
          opacity: Math.max(0, Math.min(1, globalOpacity * raw.opacity)),
          filterString: `hue-rotate(${globalHue + raw.hue}deg) saturate(${Math.max(0, (globalSaturation * raw.saturation) / 100)}%) brightness(${Math.max(0, (globalBrightness * raw.brightness) / 100)}%) contrast(${Math.max(0, (globalContrast * raw.contrast) / 100)}%) invert(${Math.min(100, Math.max(0, globalInvert + raw.invert))}%)`,
          rotate: raw.rotate || 0,
          translateX: raw.translateX || 0,
          translateY: raw.translateY || 0,
          scale: raw.scale !== undefined ? raw.scale : 1.0
        };
      }, [getRawInterpolatedFilters, globalOpacity, globalHue, globalSaturation, globalBrightness, globalContrast, globalInvert]);

      useEffect(() => {
        if (frames.length > 0 && canvasRef.current && !isGridView) {
          const ctx = canvasRef.current.getContext('2d');
          const frame = frames[currentFrameIndex];
          const w = frame.canvas.width; const h = frame.canvas.height;
          
          if (canvasRef.current.width !== w) canvasRef.current.width = w;
          if (canvasRef.current.height !== h) canvasRef.current.height = h;
          
          let processedChromaCanvas = frame.canvas;
          if (bgRemoval.type !== 'none') {
            const bgStateStr = JSON.stringify(bgRemoval);
            if (chromaCache.current.bgStateStr !== bgStateStr || chromaCache.current.canvases.length !== frames.length) {
              chromaCache.current.bgStateStr = bgStateStr;
              chromaCache.current.canvases = frames.map(f => applyChromaKey(f.canvas, bgRemoval));
            }
            processedChromaCanvas = chromaCache.current.canvases[currentFrameIndex];
          }
          
          const { opacity, filterString, rotate, translateX, translateY, scale } = getFinalRenderFilters(frames, currentFrameIndex);
          
          ctx.clearRect(0, 0, w, h); ctx.save();
          ctx.globalAlpha = opacity; ctx.filter = filterString;
          ctx.translate(w/2 + translateX, h/2 + translateY); 
          ctx.rotate((rotate * Math.PI) / 180); 
          ctx.scale(scale * (globalFlipX ? -1 : 1), scale * (globalFlipY ? -1 : 1));
          ctx.translate(-w/2, -h/2);
          ctx.drawImage(processedChromaCanvas, 0, 0); ctx.restore();
        }
      }, [frames, currentFrameIndex, globalOpacity, globalHue, globalSaturation, globalBrightness, globalContrast, globalInvert, globalFlipX, globalFlipY, bgRemoval, getFinalRenderFilters, isGridView]);

      const handleTimelineMouseDown = (e) => {
        if (e.target.closest('.keyframe-diamond')) return; 
        if (!timelineTrackRef.current) return;
        setIsPlaying(false);
        setSelectedKeyframe(null); 
        
        const rect = timelineTrackRef.current.getBoundingClientRect();
        
        const updateFrame = (clientX) => {
          const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
          const idx = Math.round(ratio * (frames.length - 1));
          setCurrentFrameIndex(idx);
        };
        updateFrame(e.clientX);
        
        const onMouseMove = (moveEvent) => updateFrame(moveEvent.clientX);
        const onMouseUp = () => { window.removeEventListener('mousemove', onMouseMove); window.removeEventListener('mouseup', onMouseUp); };
        window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp);
      };

      const handleKeyframeDrag = (e, fromIdx, trackId) => {
        e.preventDefault(); e.stopPropagation();
        const container = timelineTrackRef.current;
        if(!container) return;

        const onMouseUp = (upEvent) => {
            const rect = container.getBoundingClientRect();
            const dropRatio = Math.max(0, Math.min(1, (upEvent.clientX - rect.left) / rect.width));
            const toIdx = Math.round(dropRatio * (frames.length - 1));
            
            if (fromIdx !== toIdx) {
                isRestoring.current = true;
                setFrames(prev => {
                    const newF = prev.map(f => ({ ...f, customFilters: {...f.customFilters}, keyframes: {...f.keyframes}, easings: {...f.easings} }));
                    newF[toIdx].keyframes[trackId] = true;
                    TRACK_PROPS[trackId].forEach(p => { newF[toIdx].customFilters[p] = newF[fromIdx].customFilters[p]; });
                    newF[toIdx].easings[trackId] = newF[fromIdx].easings[trackId];
                    newF[fromIdx].keyframes[trackId] = false;
                    return newF;
                });
                setCurrentFrameIndex(toIdx);
                if (selectedKeyframeRef.current?.idx === fromIdx && selectedKeyframeRef.current?.trackId === trackId) {
                   setSelectedKeyframe({ idx: toIdx, trackId });
                }
                setTimeout(() => { isRestoring.current = false; }, 50);
            }
            window.removeEventListener('mouseup', onMouseUp);
        };
        window.addEventListener('mouseup', onMouseUp);
      };

      const updateFrameFilter = (key, value) => {
        setFrames(prevFrames => {
          const newFrames = [...prevFrames];
          const track = Object.keys(TRACK_PROPS).find(t => TRACK_PROPS[t].includes(key));
          
          if (!newFrames[currentFrameIndex].keyframes[track]) {
             const rawInterpolated = getRawInterpolatedFilters(prevFrames, currentFrameIndex);
             newFrames[currentFrameIndex].customFilters = { ...newFrames[currentFrameIndex].customFilters };
             TRACK_PROPS[track].forEach(p => {
                 newFrames[currentFrameIndex].customFilters[p] = rawInterpolated[p];
             });
             newFrames[currentFrameIndex].keyframes = { ...newFrames[currentFrameIndex].keyframes, [track]: true };
          }
          newFrames[currentFrameIndex].customFilters[key] = value;
          return newFrames;
        });
      };

      const handleGridFrameClick = (e, index) => {
          e.stopPropagation();
          if (e.shiftKey && selectedFrames.length > 0) {
              const lastSelected = selectedFrames[selectedFrames.length - 1];
              const start = Math.min(lastSelected, index);
              const end = Math.max(lastSelected, index);
              const range = [];
              for(let i = start; i <= end; i++) range.push(i);
              setSelectedFrames(prev => Array.from(new Set([...prev, ...range])));
          } else if (e.ctrlKey || e.metaKey) {
              if (selectedFrames.includes(index)) {
                  setSelectedFrames(selectedFrames.filter(i => i !== index));
              } else {
                  setSelectedFrames([...selectedFrames, index]);
              }
          } else {
              setSelectedFrames([index]);
              setCurrentFrameIndex(index);
          }
      };

      const handleGridDrop = (e, targetIndex) => {
          e.preventDefault();
          if (selectedFrames.length === 0) return;
          if (selectedFrames.includes(targetIndex)) return;

          isRestoring.current = true;
          setFrames(prev => {
              const newFrames = [...prev];
              const sortedSelected = [...selectedFrames].sort((a,b) => a - b);
              const extractedFrames = sortedSelected.map(i => newFrames[i]);
              
              for (let i = sortedSelected.length - 1; i >= 0; i--) {
                  newFrames.splice(sortedSelected[i], 1);
              }
              const removedBeforeTarget = sortedSelected.filter(i => i < targetIndex).length;
              const insertIdx = targetIndex - removedBeforeTarget;

              newFrames.splice(insertIdx, 0, ...extractedFrames);
              
              const newSelectedIndices = extractedFrames.map((_, i) => insertIdx + i);
              setSelectedFrames(newSelectedIndices);
              return newFrames;
          });
          setTimeout(() => { isRestoring.current = false; }, 50);
      };

      const handleDeleteSelectedFrames = () => {
          if (selectedFrames.length === 0 || frames.length <= 1) return;
          if (selectedFrames.length === frames.length) {
              alert(t('cantDelAll'));
              return;
          }
          isRestoring.current = true;
          setFrames(prev => prev.filter((_, i) => !selectedFrames.includes(i)));
          setSelectedFrames([]);
          setCurrentFrameIndex(0);
          setTimeout(() => { isRestoring.current = false; }, 50);
      };

      const applyBatchDelay = (val, isOffset = false) => {
          if (selectedFrames.length === 0) return;
          isRestoring.current = true;
          setFrames(prev => {
             const newFrames = [...prev];
             selectedFrames.forEach(idx => {
                 let newVal = isOffset ? newFrames[idx].delay + val : val;
                 newFrames[idx].delay = Math.max(10, newVal); 
             });
             return newFrames;
          });
          setTimeout(() => { isRestoring.current = false; }, 50);
      };

      const adjustTotalSeconds = (addSecs) => {
         const currentTotalMs = frames.reduce((acc, f) => acc + f.delay, 0);
         if (currentTotalMs === 0) return;
         const targetTotalMs = Math.max(100, currentTotalMs + addSecs * 1000);
         const ratio = targetTotalMs / currentTotalMs;
         
         isRestoring.current = true;
         setFrames(prev => prev.map(f => ({ ...f, delay: Math.max(10, Math.round(f.delay * ratio)) })));
         setTimeout(() => { isRestoring.current = false; }, 50);
      };

      const handleReverseFrames = () => {
        if (frames.length <= 1) return;
        isRestoring.current = true;
        setFrames(prev => {
            const reversed = [...prev].reverse();
            return reversed;
        });
        setSelectedFrames([]);
        setCurrentFrameIndex(0);
        setTimeout(() => { isRestoring.current = false; }, 50);
      };

      const handleDuplicateSelected = () => {
        if (selectedFrames.length === 0) return;
        isRestoring.current = true;
        setFrames(prev => {
            const newFrames = [...prev];
            const sortedSelected = [...selectedFrames].sort((a,b)=>a-b);
            const toDuplicate = sortedSelected.map(i => ({
                ...newFrames[i], 
                keyframes: {...newFrames[i].keyframes}, 
                easings: {...newFrames[i].easings}, 
                customFilters: {...newFrames[i].customFilters}
            }));
            newFrames.push(...toDuplicate);
            
            const newIndices = Array.from({length: toDuplicate.length}, (_, idx) => prev.length + idx);
            setSelectedFrames(newIndices);
            return newFrames;
        });
        setTimeout(() => { isRestoring.current = false; }, 50);
      };

      const handleDropFrame = (e, targetIndex) => {
        e.preventDefault();
        if (draggedFrameIdx === null || draggedFrameIdx === targetIndex) return;
        
        isRestoring.current = true;
        setFrames(prev => {
            const newFrames = [...prev];
            const [moved] = newFrames.splice(draggedFrameIdx, 1);
            newFrames.splice(targetIndex, 0, moved);
            return newFrames;
        });
        setCurrentFrameIndex(targetIndex);
        setDraggedFrameIdx(null);
        setTimeout(() => { isRestoring.current = false; }, 50);
      };

      const handleDeleteFrame = (e, index) => {
        e.stopPropagation();
        if (frames.length <= 1) return;
        isRestoring.current = true;
        setFrames(prev => prev.filter((_, i) => i !== index));
        const newLen = frames.length - 1;
        const nextIdx = index >= newLen ? Math.max(0, newLen - 1) : index;
        setCurrentFrameIndex(nextIdx);
        if (newLen === 1) setActiveTab('convert');
        setTimeout(() => { isRestoring.current = false; }, 50);
      };

      // == 繪製貝茲曲線 (Draw Visual Easing Curves) ==
      const renderTimelineCurves = (trackId, strokeColor) => {
        const keyframesData = frames.map((f, i) => ({ frame: f, idx: i })).filter(k => k.frame.keyframes[trackId]);
        if (keyframesData.length < 2) return null;

        const elements = [];
        for (let i = 0; i < keyframesData.length - 1; i++) {
            const k1 = keyframesData[i]; const k2 = keyframesData[i + 1];
            const maxIdx = Math.max(1, frames.length - 1);
            const x1 = (k1.idx / maxIdx) * 100; 
            const x2 = (k2.idx / maxIdx) * 100;
            const easing = k1.frame.easings[trackId];
            
            let d = "M 0 50 L 100 50"; // default linear (flat)
            if(easing === 'linear') d = "M 0 80 L 100 20";
            else if(easing === 'easeIn') d = "M 0 80 Q 80 80, 100 20";
            else if(easing === 'easeOut') d = "M 0 80 Q 20 20, 100 20";
            else if(easing === 'easeInOut') d = "M 0 80 C 50 80, 50 20, 100 20";

            elements.push(
               <svg key={`curve-${i}`} className="absolute top-0 h-full pointer-events-none opacity-70"
                    style={{ left: `${x1}%`, width: `${x2 - x1}%` }} preserveAspectRatio="none" viewBox="0 0 100 100">
                   <line x1="0" y1="50" x2="100" y2="50" stroke={strokeColor} strokeWidth="1.5" opacity="0.4" vectorEffect="non-scaling-stroke" />
                   <path d={d} fill="none" stroke={strokeColor} strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
               </svg>
            );
        }
        return elements;
      };

      const getEstimatedSize = () => {
        if (frames.length === 0) return 0;
        const baseW = frames[0].canvas.width * exportScale;
        const baseH = frames[0].canvas.height * exportScale;
        const rawBytes = baseW * baseH * 4 * frames.length;
        let multiplier = 0.25; 
        if (exportFormat.includes('webp') || exportFormat.includes('jpg')) multiplier = 0.05;
        else if (compressionLevel === 256) multiplier = 0.05;
        else if (compressionLevel === 128) multiplier = 0.035;
        else if (compressionLevel === 64) multiplier = 0.025;
        return rawBytes * multiplier;
      };

      const formatBytes = (bytes) => {
        if (bytes === 0) return '0 B'; const k = 1024; const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k)); return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
      };

      const getExportCanvasForFrame = (index, fillWhite = false) => {
        const frame = frames[index]; 
        const orgW = frame.canvas.width; const orgH = frame.canvas.height;
        const w = Math.max(1, Math.round(orgW * exportScale));
        const h = Math.max(1, Math.round(orgH * exportScale));

        const tempCanvas = document.createElement('canvas'); tempCanvas.width = w; tempCanvas.height = h;
        const ctx = tempCanvas.getContext('2d');

        if (fillWhite) {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, w, h);
        }

        const processedChromaCanvas = (bgRemoval.type !== 'none' && chromaCache.current.canvases[index]) ? chromaCache.current.canvases[index] : frame.canvas;
        const { opacity, filterString, rotate, translateX, translateY, scale } = getFinalRenderFilters(frames, index);
        
        ctx.globalAlpha = opacity; ctx.filter = filterString;
        ctx.scale(exportScale, exportScale);
        ctx.translate(orgW/2 + translateX, orgH/2 + translateY); 
        ctx.rotate((rotate * Math.PI) / 180); 
        ctx.scale(scale * (globalFlipX ? -1 : 1), scale * (globalFlipY ? -1 : 1));
        ctx.translate(-orgW/2, -orgH/2);
        
        ctx.drawImage(processedChromaCanvas, 0, 0);
        return { canvas: tempCanvas, ctx, w, h }; 
      };

      const handleExport = async () => {
        if (!isAppReady || frames.length === 0) return;
        setIsExporting(true);
        try {
          await new Promise(resolve => setTimeout(resolve, 50));
          
          if (exportFormat === 'apng') {
              const imgs = []; const delays = []; 
              let exportW = 0, exportH = 0;
              for (let i = 0; i < frames.length; i++) {
                const { ctx, w, h } = getExportCanvasForFrame(i);
                if (i === 0) { exportW = w; exportH = h; }
                imgs.push(ctx.getImageData(0, 0, exportW, exportH).data.buffer); 
                delays.push(frames[i].delay / speed);
              }
              let apngBuffer = UPNG.encode(imgs, exportW, exportH, compressionLevel, delays);

              if (!isLooping) {
                 const crcTable = new Uint32Array(256);
                 for (let i = 0; i < 256; i++) {
                    let c = i;
                    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                    crcTable[i] = c;
                 }
                 const crc32 = (buf, off, len) => {
                    let crc = 0 ^ (-1);
                    for (let i = 0; i < len; i++) crc = (crc >>> 8) ^ crcTable[(crc ^ buf[off + i]) & 0xFF];
                    return (crc ^ (-1)) >>> 0;
                 };
                 const view = new DataView(apngBuffer);
                 const uint8 = new Uint8Array(apngBuffer);
                 const length = view.byteLength;
                 let offset = 8;
                 while (offset < length) {
                    const chunkLen = view.getUint32(offset);
                    const chunkType = String.fromCharCode(uint8[offset+4], uint8[offset+5], uint8[offset+6], uint8[offset+7]);
                    if (chunkType === 'acTL') {
                       view.setUint32(offset + 12, 1); 
                       const newCrc = crc32(uint8, offset + 4, chunkLen + 4);
                       view.setUint32(offset + 8 + chunkLen, newCrc);
                       break;
                    }
                    offset += 8 + chunkLen + 4;
                 }
              }
              const blob = new Blob([apngBuffer], { type: 'image/apng' });
              const url = URL.createObjectURL(blob); 
              const a = document.createElement('a'); 
              a.href = url; a.download = `${originalFileName}_apng.png`; a.click();
              URL.revokeObjectURL(url);
          } else {
              // ZIP Exports
              const zipData = {};
              const isJpeg = exportFormat === 'zip-jpg';
              const mimeType = isJpeg ? 'image/jpeg' : (exportFormat === 'zip-webp' ? 'image/webp' : 'image/png');
              const ext = isJpeg ? 'jpg' : (exportFormat === 'zip-webp' ? 'webp' : 'png');

              for (let i = 0; i < frames.length; i++) {
                const { canvas } = getExportCanvasForFrame(i, isJpeg); 
                const buffer = await new Promise(resolve => {
                  canvas.toBlob(blob => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(new Uint8Array(reader.result));
                    reader.readAsArrayBuffer(blob);
                  }, mimeType, isJpeg ? 0.9 : 0.85); 
                });
                const idxStr = String(i + 1).padStart(3, '0');
                zipData[`frame_${idxStr}.${ext}`] = buffer;
              }
              const zipped = fflate.zipSync(zipData);
              const blob = new Blob([zipped], { type: 'application/zip' });
              const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; 
              a.download = `${originalFileName}_frames.zip`; a.click();
              URL.revokeObjectURL(url);
          }
        } catch (e) { setError("Export failed."); } finally { setIsExporting(false); }
      };

      return (
        <div 
          className="flex flex-col h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans overflow-hidden select-none relative transition-colors duration-300"
          onDragOver={(e) => { 
            e.preventDefault(); 
            if (e.dataTransfer.types && Array.from(e.dataTransfer.types).includes("Files")) {
              setIsDragOver(true); 
            }
          }}
          onDragLeave={(e) => { 
            e.preventDefault(); 
            if (!e.currentTarget.contains(e.relatedTarget)) setIsDragOver(false);
          }}
          onDrop={(e) => { 
            e.preventDefault(); 
            setIsDragOver(false);
            if (!isAppReady) return;
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
              const file = e.dataTransfer.files[0];
              handleFileDropOrSelect(file, frames.length > 0);
            }
          }}
        >
          {/* 全域拖曳換圖覆蓋層 */}
          {isDragOver && (
            <div className="absolute inset-0 bg-purple-600/20 backdrop-blur-sm z-[100] flex items-center justify-center border-[6px] border-purple-500 border-dashed pointer-events-none transition-all duration-300">
              <div className="bg-white dark:bg-slate-800 px-12 py-10 rounded-3xl shadow-2xl flex flex-col items-center gap-4 transform scale-105">
                <ImagePlus className="w-20 h-20 text-purple-600 dark:text-purple-400 animate-bounce" />
                <span className="text-purple-700 dark:text-purple-300 font-black text-3xl tracking-wide">{frames.length > 0 ? t('replace') : t('importBtn')}</span>
              </div>
            </div>
          )}

          {/* Header */}
          <header className="px-6 py-3 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-between shrink-0 shadow-sm z-10 transition-colors">
            <div className="flex items-center gap-4">
              <h1 className="text-xl font-bold flex items-center gap-2 text-slate-800 dark:text-slate-100">
                <ImageIcon className="w-6 h-6 text-blue-600 dark:text-blue-400" />{t('title')}
              </h1>
              {/* 快速鍵與作者提示 */}
              <div className="hidden md:flex group relative items-center justify-center bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded cursor-help">
                <a href="https://x.com/vm060460" target="_blank" rel="noopener noreferrer" className="text-[10px] font-bold text-slate-500 dark:text-slate-400 hover:text-blue-500 transition-colors mr-2 border-r border-slate-300 dark:border-slate-600 pr-2">
                  {t('author')}
                </a>
                <Keyboard className="w-4 h-4 text-slate-400 hover:text-blue-500" />
                <div className="absolute left-0 top-full mt-2 w-64 bg-slate-800 dark:bg-slate-700 text-white text-xs rounded-lg p-4 shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50">
                  <p className="font-bold mb-2 border-b border-slate-600 pb-1">{t('shortcuts')}</p>
                  <ul className="space-y-2 text-slate-300">
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">Space</kbd></span> <span>{t('playPause')}</span></li>
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">←</kbd> / <kbd className="bg-slate-900 px-1 rounded">→</kbd></span> <span>{t('prevNext')}</span></li>
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">Del</kbd></span> <span>{t('delKey')}</span></li>
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">Ctrl+Z</kbd></span> <span>{t('undo')}</span></li>
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">Ctrl+Y</kbd></span> <span>{t('redo')}</span></li>
                  </ul>
                </div>
              </div>
            </div>

            <div className="flex items-center gap-2">
              <div className="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg p-1 mr-2 border border-slate-200 dark:border-slate-700">
                 <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-1 rounded text-slate-500 hover:text-amber-500 dark:hover:text-amber-400">
                    {theme === 'light' ? <Moon className="w-4 h-4"/> : <Sun className="w-4 h-4"/>}
                 </button>
                 <div className="w-px h-4 bg-slate-300 dark:bg-slate-600 mx-1"></div>
                 <select value={lang} onChange={(e) => setLang(e.target.value)} className="bg-transparent text-xs text-slate-600 dark:text-slate-300 outline-none font-bold cursor-pointer">
                    <option value="zh-TW">繁體中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                 </select>
              </div>

              {frames.length > 0 && (
                <div className="flex items-center gap-2">
                  {!isCropMode && (
                    <div className="flex gap-2">
                      <button onClick={() => {setIsGridView(!isGridView); setIsPlaying(false);}} className={`flex items-center gap-1 text-sm px-3 py-1.5 rounded-md font-medium transition-colors ${isGridView ? 'bg-indigo-600 text-white shadow-inner' : 'bg-indigo-100 dark:bg-indigo-900/50 hover:bg-indigo-200 text-indigo-700 dark:text-indigo-300'}`}>
                        <LayoutGrid className="w-4 h-4"/> {isGridView ? t('canvasView') : t('gridView')}
                      </button>
                      {!isGridView && (
                        <>
                          <button onClick={() => document.getElementById('replace-upload').click()} className="flex items-center gap-1 text-sm bg-purple-100 dark:bg-purple-900/50 hover:bg-purple-200 text-purple-700 dark:text-purple-300 px-3 py-1.5 rounded-md font-medium transition-colors">
                            <ImagePlus className="w-4 h-4"/> {t('replace')}
                          </button>
                          <button onClick={() => { setIsCropMode(true); setIsPlaying(false); setCropRect({x:0, y:0, w:frames[0].canvas.width, h:frames[0].canvas.height}); }} className="flex items-center gap-1 text-sm bg-blue-100 dark:bg-blue-900/50 hover:bg-blue-200 text-blue-700 dark:text-blue-300 px-3 py-1.5 rounded-md font-medium transition-colors">
                            <Crop className="w-4 h-4"/> {t('cropExpand')}
                          </button>
                        </>
                      )}
                    </div>
                  )}
                  <div className="flex items-center gap-1 border-x border-slate-200 dark:border-slate-700 px-3 mx-1">
                    <button onClick={undo} disabled={historyPointer <= 0} className="p-1.5 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors disabled:opacity-30"><Undo2 className="w-4 h-4" /></button>
                    <button onClick={redo} disabled={historyPointer >= history.length - 1} className="p-1.5 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors disabled:opacity-30"><Redo2 className="w-4 h-4" /></button>
                  </div>
                  <button onClick={() => { setFrames([]); setIsPlaying(false); setActiveTab('global'); setHistory([]); setHistoryPointer(-1); setIsGridView(false); chromaCache.current = {bgStateStr:'', canvases:[]}; }} className="text-sm text-slate-500 dark:text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors font-medium px-3 py-1 rounded-md hover:bg-red-50 dark:hover:bg-red-900/20">{t('clear')}</button>
                </div>
              )}
            </div>
          </header>

          <main className="flex-1 flex overflow-hidden flex-col md:flex-row relative">
            {(isLoading || isExporting || !isAppReady) && (
              <div className="absolute inset-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
              </div>
            )}

            {/* 左側：主要畫布或網格視圖 */}
            <div className="flex-1 flex flex-col min-w-0 bg-slate-100 dark:bg-slate-800/50 relative">
              
              {isGridView ? (
                <div className="flex-1 flex flex-col bg-slate-100 dark:bg-slate-900 overflow-hidden">
                  {/* 網格管理工具列 */}
                  <div className="bg-white dark:bg-slate-800 px-6 py-3 border-b border-slate-200 dark:border-slate-700 flex flex-wrap items-center justify-between shadow-sm z-10 gap-4">
                    <div className="flex items-center gap-3">
                      <span className="text-sm font-bold text-slate-700 dark:text-slate-200">{t('selected')} {selectedFrames.length} / {frames.length} {t('frames')}</span>
                      <button onClick={() => setSelectedFrames(frames.map((_,i)=>i))} className="text-xs bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded hover:bg-slate-200 dark:hover:bg-slate-600">{t('selectAll')}</button>
                      <button onClick={() => setSelectedFrames([])} className="text-xs bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded hover:bg-slate-200 dark:hover:bg-slate-600">{t('deselect')}</button>
                      <div className="border-l border-slate-200 dark:border-slate-600 h-4 mx-1"></div>
                      <button onClick={handleDuplicateSelected} disabled={selectedFrames.length===0} className="text-xs bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 px-2 py-1 rounded disabled:opacity-50 flex items-center"><Copy className="w-3 h-3 mr-1"/> {t('copySelected')}</button>
                      <button onClick={handleDeleteSelectedFrames} disabled={selectedFrames.length===0} className="text-xs bg-red-50 dark:bg-red-900/40 text-red-600 dark:text-red-400 px-2 py-1 rounded disabled:opacity-50 flex items-center"><X className="w-3 h-3 mr-1"/> {t('delSelected')}</button>
                      <div className="border-l border-slate-200 dark:border-slate-600 h-4 mx-1"></div>
                      <button onClick={handleReverseFrames} className="text-xs bg-orange-50 dark:bg-orange-900/40 text-orange-600 dark:text-orange-400 px-2 py-1 rounded flex items-center font-bold"><ArrowLeftRight className="w-3 h-3 mr-1"/> {t('reverseAll')}</button>
                    </div>
                    
                    <div className="flex items-center gap-4">
                      {/* 加入時間長度區塊 */}
                      <div className="flex items-center gap-2 border-l pl-4 border-slate-200 dark:border-slate-700">
                         <span className="text-xs font-bold text-slate-600 dark:text-slate-300">{t('addTimeLen')}:</span>
                         <input type="number" value={addSecondsInput} onChange={(e)=>setAddSecondsInput(Number(e.target.value))} min="0.1" step="0.1" className="w-14 border dark:border-slate-600 dark:bg-slate-700 rounded px-1 py-0.5 text-sm" />
                         <span className="text-xs text-slate-500">s</span>
                         <select value={addPosition} onChange={(e)=>setAddPosition(e.target.value)} className="text-xs border dark:border-slate-600 dark:bg-slate-700 rounded px-1 py-1">
                           <option value="start">{t('addStart')}</option>
                           <option value="end">{t('addEnd')}</option>
                         </select>
                         <button onClick={handleAddFramesByTime} className="text-xs bg-purple-100 dark:bg-purple-900/50 text-purple-700 dark:text-purple-400 px-2 py-1 rounded hover:bg-purple-200 shadow-sm">{t('insertFrames')}</button>
                      </div>

                      <div className="flex items-center gap-2 border-l pl-4 border-slate-200 dark:border-slate-700">
                         <span className="text-xs font-bold text-slate-600 dark:text-slate-300">{t('selectedDelay')}:</span>
                         <input type="number" value={batchDelayInput} onChange={(e)=>setBatchDelayInput(Number(e.target.value))} className="w-14 border dark:border-slate-600 dark:bg-slate-700 rounded px-1 py-0.5 text-sm" />
                         <span className="text-xs text-slate-500">ms</span>
                         <button onClick={()=>applyBatchDelay(batchDelayInput, false)} disabled={selectedFrames.length===0} className="text-xs bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 px-2 py-1 rounded disabled:opacity-50">{t('set')}</button>
                      </div>
                    </div>
                  </div>

                  {/* 網格區塊 */}
                  <div className="flex-1 overflow-y-auto p-6 checkered-bg-light dark:checkered-bg-dark">
                    <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-4 auto-rows-max">
                      {frames.map((f, i) => {
                        const isSelected = selectedFrames.includes(i);
                        return (
                           <div 
                              key={`grid-${i}-${f.delay}`}
                              className={`relative aspect-square bg-white dark:bg-slate-800 border-2 rounded-lg p-1 flex flex-col items-center justify-between cursor-grab transition-all shadow-sm
                                ${isSelected ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/30 ring-2 ring-blue-300 ring-offset-1 dark:ring-offset-slate-900 scale-105' : 'border-slate-300 dark:border-slate-600 hover:border-blue-300'}
                              `}
                              draggable
                              onClick={(e) => handleGridFrameClick(e, i)}
                              onDragStart={(e) => {
                                 if (!selectedFrames.includes(i)) setSelectedFrames([i]);
                                 e.dataTransfer.effectAllowed = "move";
                              }}
                              onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; }}
                              onDrop={(e) => handleGridDrop(e, i)}
                           >
                              <span className="absolute top-1 left-1.5 text-[9px] font-mono font-bold text-slate-500 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 px-1 rounded">{i}</span>
                              <div className="w-full h-full flex items-center justify-center p-1 mt-2 pointer-events-none">
                                 <FrameThumbnail sourceCanvas={f.canvas} />
                              </div>
                              <span className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mt-1 pointer-events-none">{f.delay}ms</span>
                           </div>
                        )
                      })}
                    </div>
                  </div>
                </div>
              ) : (
                <div className={`flex-1 relative flex items-center justify-center p-4 md:p-8 checkered-bg-light dark:checkered-bg-dark overflow-hidden`}>
                  {error && (<div className="absolute top-8 left-1/2 transform -translate-x-1/2 bg-red-100 text-red-700 px-4 py-3 rounded-lg flex items-center gap-2 shadow-md z-40 border border-red-200 text-sm"><AlertCircle className="w-5 h-5" /> {error}</div>)}

                  {frames.length > 0 ? (
                    <div className="relative w-full h-full flex items-center justify-center pointer-events-none">
                      {/* 精準對位容器 */}
                      <div className="relative pointer-events-auto shadow-2xl" style={{ 
                          aspectRatio: `${frames[0].canvas.width} / ${frames[0].canvas.height}`, 
                          maxWidth: '100%', 
                          maxHeight: '100%' 
                        }}>
                        <canvas ref={canvasRef} className="w-full h-full object-contain" />
                        
                        {/* 裁切覆蓋層 */}
                        {isCropMode && (
                          <div 
                            ref={overlayRef}
                            className="absolute inset-0 z-30 cursor-crosshair pointer-events-auto"
                            onMouseDown={handleCropMouseDown}
                          >
                            <div className="absolute bg-blue-500/20 border-2 border-blue-500 shadow-[0_0_0_9999px_rgba(0,0,0,0.6)]" 
                                 style={{
                                   left: `${(cropRect.x / frames[0].canvas.width) * 100}%`, 
                                   top: `${(cropRect.y / frames[0].canvas.height) * 100}%`, 
                                   width: `${(cropRect.w / frames[0].canvas.width) * 100}%`, 
                                   height: `${(cropRect.h / frames[0].canvas.height) * 100}%`
                                 }}
                            >
                              <div className="absolute -top-1 -left-1 w-2 h-2 bg-white border border-blue-600"></div><div className="absolute -top-1 -right-1 w-2 h-2 bg-white border border-blue-600"></div>
                              <div className="absolute -bottom-1 -left-1 w-2 h-2 bg-white border border-blue-600"></div><div className="absolute -bottom-1 -right-1 w-2 h-2 bg-white border border-blue-600"></div>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  ) : (
                    <div className={`border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-3xl p-8 md:p-16 text-center bg-white/60 dark:bg-slate-800/60 shadow-sm w-full max-w-lg cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 dark:hover:bg-blue-900/20 transition-all`} onClick={() => isAppReady && document.getElementById('file-upload').click()}>
                      <div className="bg-blue-100 dark:bg-blue-900/50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6"><Upload className="w-8 h-8 text-blue-600 dark:text-blue-400" /></div>
                      <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-200 mb-2">{t('importBtn')}</h2>
                      <p className="text-slate-500 dark:text-slate-400">{t('dragDrop')}</p>
                    </div>
                  )}

                  {/* 裁切/擴展控制面板 */}
                  {isCropMode && (
                    <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-white dark:bg-slate-800 p-4 rounded-xl shadow-2xl z-40 border border-slate-200 dark:border-slate-700 flex items-center gap-4">
                      <div className="flex gap-2">
                        <div className="flex flex-col"><label className="text-[10px] text-slate-500 dark:text-slate-400">X</label><input type="number" value={Math.round(cropRect.x)} onChange={(e)=>setCropRect({...cropRect, x: Number(e.target.value)})} className="w-16 border dark:border-slate-600 dark:bg-slate-700 rounded p-1 text-sm"/></div>
                        <div className="flex flex-col"><label className="text-[10px] text-slate-500 dark:text-slate-400">Y</label><input type="number" value={Math.round(cropRect.y)} onChange={(e)=>setCropRect({...cropRect, y: Number(e.target.value)})} className="w-16 border dark:border-slate-600 dark:bg-slate-700 rounded p-1 text-sm"/></div>
                        <div className="flex flex-col"><label className="text-[10px] text-slate-500 dark:text-slate-400">W</label><input type="number" value={Math.round(cropRect.w)} onChange={(e)=>setCropRect({...cropRect, w: Number(e.target.value)})} className="w-16 border dark:border-slate-600 dark:bg-slate-700 rounded p-1 text-sm"/></div>
                        <div className="flex flex-col"><label className="text-[10px] text-slate-500 dark:text-slate-400">H</label><input type="number" value={Math.round(cropRect.h)} onChange={(e)=>setCropRect({...cropRect, h: Number(e.target.value)})} className="w-16 border dark:border-slate-600 dark:bg-slate-700 rounded p-1 text-sm"/></div>
                      </div>
                      
                      <div className="flex flex-col gap-1 border-l dark:border-slate-700 pl-4 justify-center items-center">
                        <span className="text-[10px] text-slate-500 dark:text-slate-400 font-bold mb-1">{t('alignMode')}</span>
                        <div className="flex gap-1 bg-slate-100 dark:bg-slate-700 p-1 rounded-lg">
                          <button onClick={() => alignCropRect('left')} className="p-1 hover:bg-white dark:hover:bg-slate-600 rounded hover:text-blue-600"><AlignLeft className="w-4 h-4"/></button>
                          <button onClick={() => alignCropRect('center')} className="p-1 hover:bg-white dark:hover:bg-slate-600 rounded hover:text-blue-600"><AlignCenter className="w-4 h-4"/></button>
                          <button onClick={() => alignCropRect('right')} className="p-1 hover:bg-white dark:hover:bg-slate-600 rounded hover:text-blue-600"><AlignRight className="w-4 h-4"/></button>
                        </div>
                      </div>

                      <div className="flex flex-col gap-1 border-l dark:border-slate-700 pl-4">
                        <button onClick={applyCropAndResize} className="px-4 py-1.5 bg-blue-600 text-white rounded text-sm font-bold hover:bg-blue-700">{t('applyCrop')}</button>
                        <button onClick={()=>setIsCropMode(false)} className="px-4 py-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded text-xs hover:bg-slate-200 dark:hover:bg-slate-600">{t('cancel')}</button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ===== 多軌道 AE Style 關鍵影格時間軸 ===== */}
              {frames.length > 1 && !isCropMode && !isGridView && (
                <div className="h-[220px] bg-[#f8f9fa] dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 shrink-0 flex flex-col shadow-[0_-4px_15px_-3px_rgba(0,0,0,0.05)] z-20 select-none relative overflow-y-auto custom-scrollbar">
                  
                  {/* 上方：影格數字標尺 */}
                  <div className="h-6 border-b border-slate-200 dark:border-slate-700 flex relative overflow-hidden px-12 bg-white dark:bg-slate-800 sticky top-0 z-30">
                    {Array.from({ length: Math.ceil(frames.length / 10) + 1 }).map((_, i) => {
                      const frameNum = i * 10;
                      if (frameNum >= frames.length) return null;
                      return (
                        <div key={i} className="absolute top-0 bottom-0 border-l border-slate-300 dark:border-slate-600 flex items-end pb-0.5" style={{ left: `calc(3rem + (100% - 6rem) * ${(frameNum / (frames.length - 1))})` }}>
                          <span className="text-[10px] text-slate-400 dark:text-slate-500 font-mono ml-1 leading-none">{frameNum}</span>
                        </div>
                      )
                    })}
                  </div>

                  {/* 下方：多軌道區塊 */}
                  <div className="flex-1 relative px-12 py-3 flex flex-col gap-1.5" ref={timelineTrackRef} onMouseDown={handleTimelineMouseDown}>
                    
                    {/* 紅色播放指標 */}
                    <div className="absolute top-0 bottom-0 w-px bg-red-500 z-40 pointer-events-none" style={{ left: `calc(3rem + (100% - 6rem) * ${(currentFrameIndex / Math.max(1, frames.length - 1))})` }}>
                      <div className="absolute top-0 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[5px] border-l-transparent border-r-[5px] border-r-transparent border-t-[7px] border-t-red-500"></div>
                    </div>

                    {/* 內部相對容器 */}
                    <div className="relative w-full h-full flex flex-col gap-1.5">
                        {/* 影格預覽軌道 */}
                        <div className="relative h-10 bg-slate-300/30 dark:bg-slate-700/30 rounded-sm border border-slate-300 dark:border-slate-600 flex items-center mb-2">
                          <span className="absolute -left-10 text-[9px] text-slate-500 dark:text-slate-400 font-bold z-20">{t('trackFrame')}</span>
                          {frames.map((frame, idx) => {
                            const isSelected = currentFrameIndex === idx;
                            return (
                              <div 
                                key={`${idx}-${frame.delay}`} 
                                className={`absolute top-0 bottom-0 flex items-center justify-center transition-all group cursor-pointer ${isSelected ? 'border-2 border-blue-500 bg-blue-500/20 z-10 scale-110 shadow-md' : 'opacity-80 hover:opacity-100'}`}
                                style={{ left: `${(idx / (frames.length - 1)) * 100}%`, width: '28px', transform: 'translateX(-50%)' }}
                                onMouseDown={(e) => { 
                                  e.stopPropagation(); setCurrentFrameIndex(idx); setIsPlaying(false); setActiveTab('edit'); 
                                }}
                              >
                                <FrameThumbnail sourceCanvas={frame.canvas} />
                              </div>
                            );
                          })}
                        </div>

                        {/* 特效軌道 */}
                        {TRACKS_INFO.map(track => {
                          const hasKeyframes = frames.some(f => f.keyframes[track.id]);
                          if (!hasKeyframes) return null; 

                          return (
                            <div key={track.id} className="relative h-6 bg-slate-200/50 dark:bg-slate-800/50 rounded-sm border border-slate-300 dark:border-slate-700 flex items-center animate-fade-in">
                              <span className="absolute -left-10 text-[9px] text-slate-500 dark:text-slate-400 font-bold">{t(track.labelKey)}</span>
                              
                              {/* 繪製視覺化貝茲曲線 */}
                              {renderTimelineCurves(track.id, track.stroke)}

                              {frames.map((frame, idx) => {
                                if (!frame.keyframes[track.id]) return null;
                                const isKeyframeSelected = selectedKeyframe?.idx === idx && selectedKeyframe?.trackId === track.id;
                                
                                return (
                                  <div 
                                    key={idx} 
                                    className={`absolute top-1/2 -mt-1.5 w-3 h-3 rotate-45 cursor-grab active:cursor-grabbing hover:scale-125 transition-all z-10 
                                      ${isKeyframeSelected ? 'bg-red-500 border border-red-700 shadow-[0_0_8px_rgba(239,68,68,0.8)] scale-125' : `${track.color} border ${track.border} shadow-sm`}`}
                                    style={{ left: `${(idx / (frames.length - 1)) * 100}%`, transform: 'translateX(-50%) translateY(-50%) rotate(45deg)' }}
                                    onMouseDown={(e) => {
                                       setCurrentFrameIndex(idx); setIsPlaying(false); setActiveTab('edit');
                                       setSelectedKeyframe({ idx, trackId: track.id });
                                       handleKeyframeDrag(e, idx, track.id);
                                    }}
                                  />
                                );
                              })}
                            </div>
                          )
                        })}
                    </div>
                    
                    {!TRACKS_INFO.some(t => frames.some(f => f.keyframes[t.id])) && (
                      <div className="w-full text-center text-[10px] text-slate-400 mt-2 font-medium">
                         {t('noKfs')}
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* 右側：控制面板 */}
            {frames.length > 0 && !isCropMode && !isGridView && (
              <div className="w-full md:w-[380px] bg-white dark:bg-slate-800 border-t md:border-t-0 md:border-l border-slate-200 dark:border-slate-700 flex flex-col shrink-0 h-1/2 md:h-full z-10 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] transition-colors">
                
                {frames.length > 1 && (
                  <div className="p-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 shrink-0 space-y-3">
                    <div className="flex items-center justify-between">
                      <h2 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest flex items-center gap-1">{t('globalCtrl')}</h2>
                      <label className="flex items-center gap-1.5 cursor-pointer group">
                        <div className={`relative w-8 h-4 rounded-full transition-colors ${isLooping ? 'bg-blue-500' : 'bg-slate-300 dark:bg-slate-600'}`}><div className={`absolute top-0.5 left-0.5 bg-white w-3 h-3 rounded-full transition-transform ${isLooping ? 'translate-x-4' : 'translate-x-0'}`}></div></div>
                        <span className="text-xs font-medium text-slate-600 dark:text-slate-300">{t('loop')}</span>
                        <input type="checkbox" className="hidden" checked={isLooping} onChange={() => setIsLooping(!isLooping)} />
                      </label>
                    </div>
                    <div className="flex items-center gap-3">
                      <button onClick={() => { if (!isPlaying && currentFrameIndex >= frames.length - 1) setCurrentFrameIndex(0); setIsPlaying(!isPlaying); }} className={`w-10 h-10 flex items-center justify-center rounded-full transition-all flex-shrink-0 shadow-md ${isPlaying ? 'bg-slate-800 dark:bg-slate-700 text-white' : 'bg-blue-600 text-white hover:bg-blue-500'}`}>
                        {isPlaying ? <Pause className="w-4 h-4 fill-current" /> : <Play className="w-4 h-4 ml-1 fill-current" />}
                      </button>
                      <FilterSliderWithInput value={speed} min={0.1} max={5.0} step={0.1} onChange={setSpeed} />
                      <span className="text-xs font-bold text-slate-500 dark:text-slate-400 ml-1">{t('speed')}</span>
                    </div>
                  </div>
                )}

                {/* 分頁按鈕 */}
                <div className="flex border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 shrink-0">
                  {frames.length === 1 && (<button onClick={() => setActiveTab('convert')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 transition-colors ${activeTab === 'convert' ? 'text-blue-600 dark:text-blue-400 bg-white dark:bg-slate-800 border-b-2 border-blue-600' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 border-b-2 border-transparent'}`}><Wand2 className="w-4 h-4" /> {t('convertAnim')}</button>)}
                  {frames.length > 1 && (
                    <>
                      <button onClick={() => setActiveTab('global')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 transition-colors ${activeTab === 'global' ? 'text-blue-600 dark:text-blue-400 bg-white dark:bg-slate-800 border-b-2 border-blue-600' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 border-b-2 border-transparent'}`}><Globe className="w-4 h-4" /> {t('global')}</button>
                      <button onClick={() => { setActiveTab('edit'); setIsPlaying(false); }} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 transition-colors ${activeTab === 'edit' ? 'text-purple-600 dark:text-purple-400 bg-white dark:bg-slate-800 border-b-2 border-purple-600' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 border-b-2 border-transparent'}`}><Sparkles className="w-4 h-4" /> {t('editFx')}</button>
                    </>
                  )}
                </div>

                         </select>
                      </div>
                      {exportFormat === 'apng' && (
                          <div className="flex items-center gap-2">
                             <select value={compressionLevel} onChange={(e) => setCompressionLevel(parseInt(e.target.value))} className="flex-1 px-2 py-1.5 rounded border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-[11px] font-medium text-slate-700 dark:text-slate-300">
                               <option value={0}>{t('compLossless')}</option>
                               <option value={256}>{t('comp256')}</option>
                               <option value={128}>{t('comp128')}</option>
                               <option value={64}>{t('comp64')}</option>
                             </select>
                          </div>
                      )}
                      <div className="flex items-center gap-2">
                         <select value={exportScale} onChange={(e) => setExportScale(parseFloat(e.target.value))} className="flex-1 px-2 py-1.5 rounded border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-[11px] font-medium text-slate-700 dark:text-slate-300">
                           <option value={1.0}>{t('size100')}</option>
                           <option value={0.75}>{t('size75')}</option>
                           <option value={0.5}>{t('size50')}</option>
                         </select>
                         <span className="text-[10px] bg-white dark:bg-slate-800 px-2 py-1.5 border border-slate-200 dark:border-slate-700 rounded font-mono text-blue-600 dark:text-blue-400 min-w-[70px] text-center shadow-sm">{t('estSize')} {formatBytes(getEstimatedSize())}</span>
                      </div>
                    </div>
                  )}
                  <div className="flex flex-col gap-2">
                    <button onClick={handleExport} disabled={isExporting || frames.length === 0} className="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-bold shadow-sm flex items-center justify-center gap-2 disabled:opacity-50 transition-colors">
                      <Download className="w-4 h-4" /> {frames.length > 1 ? (exportFormat === 'apng' ? t('exportBtn') : t('exportZip')) : t('exportBtn')}
                    </button>
                  </div>
                  <input id="file-upload" type="file" accept="image/gif, image/png, image/apng, image/jpeg, image/webp" className="hidden" disabled={!isAppReady} onChange={onFileChange} />
                  <input id="replace-upload" type="file" accept="image/gif, image/png, image/apng, image/jpeg, image/webp" className="hidden" disabled={!isAppReady} onChange={onReplaceFileChange} />
                </div>
              </div>
            )}
          </main>

          <style dangerouslySetInnerHTML={{__html: `
            .checkered-bg-light {
              background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
              background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            }
            .checkered-bg-dark {
              background-image: linear-gradient(45deg, #1e293b 25%, transparent 25%), linear-gradient(-45deg, #1e293b 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1e293b 75%), linear-gradient(-45deg, transparent 75%, #1e293b 75%);
              background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; background-color: #0f172a;
            }
            .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
            .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
            .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
            input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
          `}} />
        </div>
      );
    }

    // 結合 Range 與 Number 雙向綁定的 UI 元件
    function FilterSliderWithInput({ value, min, max, step = 1, onChange }) {
      const isFloat = !Number.isInteger(step);
      const displayVal = isFloat ? Number(value).toFixed(1) : Math.round(value);
      
      const handleInputChange = (e) => {
        let val = parseFloat(e.target.value);
        if (isNaN(val)) return;
        onChange(val);
      };
      
      const handleBlur = (e) => {
        let val = parseFloat(e.target.value);
        if (isNaN(val)) val = 0;
        onChange(val);
      };

      return (
        <div className="flex items-center gap-3">
          <input type="range" min={min} max={max} step={step} value={value} onChange={(e) => onChange(parseFloat(e.target.value))} className="flex-1 accent-blue-500 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer" />
          <input type="number" value={displayVal} onChange={handleInputChange} onBlur={handleBlur} className="w-[52px] px-1 py-1 text-[11px] text-right border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-200 rounded font-mono text-slate-700 focus:outline-none focus:border-blue-500 shrink-0 shadow-inner" />
        </div>
      );
    }

    const FrameThumbnail = React.memo(({ sourceCanvas }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current && sourceCanvas) {
          const ctx = ref.current.getContext('2d', { willReadFrequently: true });
          const w = ref.current.width;
          const h = ref.current.height;
          ctx.clearRect(0, 0, w, h);
          const scale = Math.min(w / sourceCanvas.width, h / sourceCanvas.height);
          const sw = sourceCanvas.width * scale;
          const sh = sourceCanvas.height * scale;
          ctx.drawImage(sourceCanvas, (w - sw) / 2, (h - sh) / 2, sw, sh);
        }
      }, [sourceCanvas]);
      return <canvas ref={ref} width={32} height={32} className="w-full h-full object-contain pointer-events-none drop-shadow-sm" />;
    });

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
