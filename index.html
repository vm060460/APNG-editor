                            <div className="grid grid-cols-2 gap-2 mt-4">
                               <button onClick={() => handleQuickMove('right')} className="py-2 bg-white dark:bg-slate-800 border border-purple-200 dark:border-purple-800 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 transition-colors">向右移出畫布</button>
                               <button onClick={() => handleQuickMove('left')} className="py-2 bg-white dark:bg-slate-800 border border-purple-200 dark:border-purple-800 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 transition-colors">向左移出畫布</button>
                               <button onClick={() => handleQuickMove('down')} className="py-2 bg-white dark:bg-slate-800 border border-purple-200 dark:border-purple-800 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 transition-colors">向下落出畫布</button>
                               <button onClick={() => handleQuickMove('up')} className="py-2 bg-white dark:bg-slate-800 border border-purple-200 dark:border-purple-800 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 transition-colors">向上飛出畫布</button>
                            </div>
                          </div>
                        )}
                        <button onClick={() => triggerExplicitGradient(`${gradType}_reset`)} className="w-full mt-3 py-2 bg-white/50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border border-slate-300 dark:border-slate-600 text-xs font-bold rounded-lg hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-600 transition-colors shadow-sm">{t('clearTrack')}</button>
                      </div>
                    </div>
                  )}

                </div>

                {/* 匯出面板 (打開 Modal) */}
                <div className="p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 shrink-0">
                  <button onClick={() => {
                      setExportConfig(prev => ({...prev, customFrameCount: frames.length}));
                      setIsExportModalOpen(true);
                  }} disabled={isExporting || frames.length === 0} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold shadow-md flex items-center justify-center gap-2 disabled:opacity-50 transition-colors">
                      <Download className="w-5 h-5" /> {t('exportSettingsBtn')}
                  </button>
                  <input id="file-upload" type="file" accept=".json, application/json, image/gif, image/png, image/apng, image/jpeg, image/webp, video/*" className="hidden" disabled={!isAppReady} onChange={onFileChange} />
                  <input id="replace-upload" type="file" accept=".json, application/json, image/gif, image/png, image/apng, image/jpeg, image/webp, video/*" className="hidden" disabled={!isAppReady} onChange={onReplaceFileChange} />
                </div>
              </div>
            )}
          </main>

          <style dangerouslySetInnerHTML={{__html: `
            .checkered-bg-light {
              background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
              background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            }
            .checkered-bg-dark {
              background-image: linear-gradient(45deg, #1e293b 25%, transparent 25%), linear-gradient(-45deg, #1e293b 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1e293b 75%), linear-gradient(-45deg, transparent 75%, #1e293b 75%);
              background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; background-color: #0f172a;
            }
            .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
            .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
            .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
            input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
          `}} />
        </div>
      );
    }

    // 結合 Range 與 Number 雙向綁定的 UI 元件
    function FilterSliderWithInput({ value, min, max, step = 1, onChange }) {
      const isFloat = !Number.isInteger(step);
      const [localVal, setLocalVal] = React.useState(isFloat ? Number(value).toFixed(1) : Math.round(value));
      const [isEditing, setIsEditing] = React.useState(false);

      React.useEffect(() => {
        if (!isEditing) {
          setLocalVal(isFloat ? Number(value).toFixed(1) : Math.round(value));
        }
      }, [value, isFloat, isEditing]);

      const handleInputChange = (e) => {
        setLocalVal(e.target.value);
      };
      
      const handleBlur = () => {
        setIsEditing(false);
        let val = parseFloat(localVal);
        if (isNaN(val)) val = value;
        val = Math.max(min, val);
        onChange(val);
        setLocalVal(isFloat ? Number(val).toFixed(1) : Math.round(val));
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') e.target.blur();
      };

      return (
        <div className="flex items-center gap-3">
          <input type="range" min={min} max={max} step={step} value={value > max ? max : value} onChange={(e) => onChange(parseFloat(e.target.value))} className="flex-1 accent-blue-500 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer" />
          <input type="number" step={step} value={isEditing ? localVal : (isFloat ? Number(value).toFixed(1) : Math.round(value))} onChange={handleInputChange} onFocus={() => setIsEditing(true)} onBlur={handleBlur} onKeyDown={handleKeyDown} className="w-[52px] px-1 py-1 text-[11px] text-right border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-200 rounded font-mono text-slate-700 dark:text-slate-200 focus:outline-none focus:border-blue-500 shrink-0 shadow-inner" />
        </div>
      );
    }

    const FrameThumbnail = React.memo(({ sourceCanvas }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current && sourceCanvas) {
          const ctx = ref.current.getContext('2d', { willReadFrequently: true });
          const w = ref.current.width;
          const h = ref.current.height;
          ctx.clearRect(0, 0, w, h);
          const scale = Math.min(w / sourceCanvas.width, h / sourceCanvas.height);
          const sw = sourceCanvas.width * scale;
          const sh = sourceCanvas.height * scale;
          ctx.drawImage(sourceCanvas, (w - sw) / 2, (h - sh) / 2, sw, sh);
        }
      }, [sourceCanvas]);
      return <canvas ref={ref} width={32} height={32} className="w-full h-full object-contain pointer-events-none drop-shadow-sm" />;
    });

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
