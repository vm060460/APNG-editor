            });

              f: lastState.frames.map(f => ({ f: f.customFilters, key: f.keyframes, ease: f.easings, delay: f.delay })),

            if (currentDataStr !== lastDataStr) {
              const currentState = {
                frames: frames.map(f => ({ ...f, customFilters: { ...f.customFilters }, keyframes: { ...f.keyframes }, easings: { ...f.easings }, delay: f.delay })),

      const applyState = (state) => {
        setFrames(prevFrames => {
            return state.frames.map((sf, i) => {
                const baseFrame = prevFrames[i] || prevFrames[0] || sf;

                    ...baseFrame,

        setGlobalSaturation(state.globals.globalSaturation); setGlobalBrightness(state.globals.globalBrightness);
        setGlobalContrast(state.globals.globalContrast); setGlobalInvert(state.globals.globalInvert);
        setGlobalFlipX(state.globals.globalFlipX || false); setGlobalFlipY(state.globals.globalFlipY || false);
        setSpeed(state.globals.speed); setBgRemoval(state.globals.bgRemoval);
      };

      useEffect(() => {
        undoRef.current = undo;

      useEffect(() => {

          const activeTag = document.activeElement?.tagName;

            if (e.key.toLowerCase() === 'z') {

            if (e.code === 'Space') {
              e.preventDefault();
              setIsPlaying(p => !p);
            } else if (e.key === 'ArrowRight') {
              e.preventDefault();
              setIsPlaying(false);
              setCurrentFrameIndex(prev => Math.min(framesLenRef.current - 1, prev + 1));
            } else if (e.key === 'ArrowLeft') {
              e.preventDefault();
              setIsPlaying(false);
              setCurrentFrameIndex(prev => Math.max(0, prev - 1));

                 const { idx, trackId } = selectedKeyframeRef.current;
                 isRestoring.current = true;
                 setFrames(prev => {
                    const newFrames = prev.map(f => ({...f, keyframes: {...f.keyframes}}));
                    newFrames[idx].keyframes[trackId] = false;

                 });

            }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [isCropMode, isGridView, isExportModalOpen]);

      const applyChromaKey = (sourceCanvas, bgSettings) => {
        if (bgSettings.type === 'none') return sourceCanvas;
        const { type, color, tolerance } = bgSettings;
        let targetR, targetG, targetB;
        if (type === 'green') { targetR = 0; targetG = 255; targetB = 0; }
        else if (type === 'black') { targetR = 0; targetG = 0; targetB = 0; }
        else if (type === 'white') { targetR = 255; targetG = 255; targetB = 255; }
        else {
          const hex = color.replace('#', '');
          targetR = parseInt(hex.substring(0,2), 16) || 0;
          targetG = parseInt(hex.substring(2,4), 16) || 0;
          targetB = parseInt(hex.substring(4,6), 16) || 0;
        }

        const canvas = document.createElement('canvas');
        canvas.width = sourceCanvas.width; canvas.height = sourceCanvas.height;
        const ctx = canvas.getContext('2d', {willReadFrequently: true});
        ctx.drawImage(sourceCanvas, 0, 0);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
          if (data[i+3] === 0) continue; 
          const r = data[i], g = data[i+1], b = data[i+2];
          const dist = Math.sqrt(Math.pow(r-targetR, 2) + Math.pow(g-targetG, 2) + Math.pow(b-targetB, 2));
          if (dist <= tolerance) data[i+3] = 0; 
        }
        ctx.putImageData(imgData, 0, 0);
        return canvas;
      };

      const buildFrameObj = (canvas, delay) => ({
        canvas, delay, 
        customFilters: { ...DEFAULT_FILTERS }, 
        keyframes: { opacity: false, scale: false, rotate: false, translate: false, color: false }, 
        easings: { opacity: 'linear', scale: 'linear', rotate: 'linear', translate: 'linear', color: 'linear' }
      });

      const cloneCanvas = (oldCanvas) => {
        const c = document.createElement('canvas'); c.width = oldCanvas.width; c.height = oldCanvas.height;
        c.getContext('2d').drawImage(oldCanvas, 0, 0); return c;
      };

      const extractVideoFrames = (file) => {
        return new Promise((resolve, reject) => {
            const video = document.createElement('video');
            video.autoplay = false;
            video.muted = true;
            video.playsInline = true;
            video.src = URL.createObjectURL(file);
            const framesArr = [];
            const targetFPS = 12; 
            const timeStep = 1 / targetFPS;

            video.onloadeddata = () => {
                const duration = video.duration;
                let width = video.videoWidth;
                let height = video.videoHeight;
                const MAX_DIM = 1080; 
                if (width > MAX_DIM || height > MAX_DIM) {
                    const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
                    width = Math.round(width * ratio);
                    height = Math.round(height * ratio);
                }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });

                let currentTime = 0;

                const captureFrame = () => {
                    ctx.drawImage(video, 0, 0, width, height);
                    const frameCanvas = document.createElement('canvas');
                    frameCanvas.width = width; frameCanvas.height = height;
                    frameCanvas.getContext('2d').drawImage(canvas, 0, 0);
                    
                    framesArr.push(buildFrameObj(frameCanvas, Math.round(1000 / targetFPS)));

                    currentTime += timeStep;
                    if (currentTime <= duration && framesArr.length < 300) {
                        video.currentTime = currentTime;
                    } else {
                        URL.revokeObjectURL(video.src);
                        resolve(framesArr);
                    }
                };

                video.onseeked = captureFrame;
                video.currentTime = currentTime; 
            };
            
            video.onerror = () => reject(new Error("影片載入失敗"));
        });
      };

      const gifToFrames = (buffer) => {
        const gif = parseGIF(buffer); const rawFrames = decompressFrames(gif, true);
        const w = gif.lsd.width; const h = gif.lsd.height;
        const compositedFrames = [];
        const tempCanvas = document.createElement('canvas'); tempCanvas.width = w; tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
        let previousImageData = null;

        for (let i = 0; i < rawFrames.length; i++) {
          const { patch, dims, disposalType, delay } = rawFrames[i];
          if (disposalType !== 3) previousImageData = tempCtx.getImageData(0, 0, w, h);

          if (dims.width > 0 && dims.height > 0) {
            const patchData = new ImageData(new Uint8ClampedArray(patch), dims.width, dims.height);
            const patchCanvas = document.createElement('canvas');
            patchCanvas.width = dims.width; patchCanvas.height = dims.height;
            patchCanvas.getContext('2d').putImageData(patchData, 0, 0);
            tempCtx.drawImage(patchCanvas, dims.left, dims.top);
          }

          const finalDelay = (delay || 100) < 20 ? 100 : (delay || 100);
          compositedFrames.push(buildFrameObj(cloneCanvas(tempCanvas), finalDelay));
          if (disposalType === 2) tempCtx.clearRect(dims.left, dims.top, dims.width, dims.height);
          else if (disposalType === 3 && previousImageData) tempCtx.putImageData(previousImageData, 0, 0);
        }
        return compositedFrames;
      };

      const apngToFrames = async (buffer) => {
        const img = UPNG.decode(buffer); const rgbaFrames = UPNG.toRGBA8(img);
        return rgbaFrames.map((rgba, index) => {
          const imageData = new ImageData(new Uint8ClampedArray(rgba), img.width, img.height);
          const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
          canvas.getContext('2d').putImageData(imageData, 0, 0);
          return buildFrameObj(canvas, (img.frames && img.frames[index]) ? (img.frames[index].delay || 100) : 100);
        });
      };

      const loadGenericImage = async (file) => {
        const img = new Image(); const url = URL.createObjectURL(file);
        await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = url; });
        const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0); URL.revokeObjectURL(url);
        return [buildFrameObj(canvas, 1000)];
      };

      const parseFileToFrames = async (file) => {
        if (file.type.startsWith('video/')) {
            return await extractVideoFrames(file);
        }
        const buffer = await file.arrayBuffer(); const bytes = new Uint8Array(buffer);
        if (bytes[0] === 0x47 && bytes[1] === 0x49 && bytes[2] === 0x46) return gifToFrames(buffer);
        else if (bytes[0] === 0x89 && bytes[1] === 0x50 && bytes[2] === 0x4E && bytes[3] === 0x47) return await apngToFrames(buffer);
        else return await loadGenericImage(file);
      };

      const handleFileDropOrSelect = async (file, isReplace = false) => {
        if (!file || !isAppReady) return;
        try {
          setIsLoading(true); setError(null); setIsPlaying(false); isRestoring.current = true;
          setIsCropMode(false); setSelectedKeyframe(null);
          
          const nameExtIdx = file.name.lastIndexOf('.');
          const nameWithoutExt = nameExtIdx !== -1 ? file.name.substring(0, nameExtIdx) : file.name;
          setOriginalFileName(nameWithoutExt);

          let parsedFrames = [];
          let loadedGlobals = null;
          let isJsonImport = false;

          if (file.name.toLowerCase().endsWith('.json') || file.type === 'application/json') {
             isJsonImport = true;
             const text = await file.text();
             const data = JSON.parse(text);
             if (!data.metadata || data.metadata.format !== "Motion Image Editor Export") {
                 throw new Error("Invalid JSON");
             }
             
             parsedFrames = await Promise.all(data.frames.map(async (f) => {
                 const img = new Image();
                 await new Promise((resolve, reject) => { 
                     img.onload = resolve; 
                     img.onerror = reject;

                 const c = document.createElement('canvas');
                 c.width = img.width; c.height = img.height;

                     canvas: c,

                     keyframes: f.keyframes || { opacity: false, scale: false, rotate: false, translate: false, color: false },
                     easings: f.easings || { opacity: 'linear', scale: 'linear', rotate: 'linear', translate: 'linear', color: 'linear' }
                 };
             }));
             loadedGlobals = data.globals;
          } else {
             parsedFrames = await parseFileToFrames(file);
          }

          if (isReplace && frames.length > 0 && !isJsonImport) {
              if (frames.length === 1 && parsedFrames.length > 1) {
                  setSpeed(1.0); setGlobalOpacity(1.0); setGlobalHue(0); setGlobalSaturation(100); 
                  setGlobalBrightness(100); setGlobalContrast(100); setGlobalInvert(0); setGlobalFlipX(false); setGlobalFlipY(false);
                  setBgRemoval({ type: 'none', color: '#00ff00', tolerance: 50 });
                  chromaCache.current = { bgStateStr: '', canvases: [] }; 

                  setFrames(parsedFrames); setCurrentFrameIndex(0); currentFrameIndexRef.current = 0;
                  pushInitialState(parsedFrames);
                  setActiveTab('global'); setIsPlaying(false);
              } else {
                  const replacedFrames = frames.map((f, i) => {
                      const newFrameData = parsedFrames[i] || parsedFrames[parsedFrames.length - 1];
                      return { ...f, canvas: newFrameData.canvas };

                  setFrames(replacedFrames);
                  chromaCache.current = { bgStateStr: '', canvases: [] }; 
                  
                  const currentState = {
                    frames: replacedFrames.map(f => ({ ...f, customFilters: { ...f.customFilters }, keyframes: { ...f.keyframes }, easings: { ...f.easings }, delay: f.delay })),
                    globals: { globalOpacity, globalHue, globalSaturation, globalBrightness, globalContrast, globalInvert, globalFlipX, globalFlipY, speed, bgRemoval }
                  };
                  const newHistory = history.slice(0, historyPointer + 1);
                  newHistory.push(currentState);
                  if (newHistory.length > 30) newHistory.shift();
                  setHistory(newHistory);
                  setHistoryPointer(newHistory.length - 1);
              }
          } else {
              if (loadedGlobals) {
                 setGlobalOpacity(loadedGlobals.opacity ?? 1.0);
                 setGlobalHue(loadedGlobals.hue ?? 0);
                 setGlobalSaturation(loadedGlobals.saturation ?? 100);
                 setGlobalBrightness(loadedGlobals.brightness ?? 100);
                 setGlobalContrast(loadedGlobals.contrast ?? 100);
                 setGlobalInvert(loadedGlobals.invert ?? 0);
                 setGlobalFlipX(loadedGlobals.flipX ?? false);
                 setGlobalFlipY(loadedGlobals.flipY ?? false);
                 setSpeed(loadedGlobals.speed ?? 1.0);
                 setBgRemoval(loadedGlobals.bgRemoval ?? { type: 'none', color: '#00ff00', tolerance: 50 });
              } else {
                 setSpeed(1.0); setGlobalOpacity(1.0); setGlobalHue(0); setGlobalSaturation(100); 
                 setGlobalBrightness(100); setGlobalContrast(100); setGlobalInvert(0); setGlobalFlipX(false); setGlobalFlipY(false);
                 setBgRemoval({ type: 'none', color: '#00ff00', tolerance: 50 });
              }
              
              chromaCache.current = { bgStateStr: '', canvases: [] }; 

              setFrames(parsedFrames); setCurrentFrameIndex(0); currentFrameIndexRef.current = 0;
              setSelectedFrames([]); 
              
              const mappedGlobals = loadedGlobals ? {
                 globalOpacity: loadedGlobals.opacity ?? 1.0,
                 globalHue: loadedGlobals.hue ?? 0,
                 globalSaturation: loadedGlobals.saturation ?? 100,
                 globalBrightness: loadedGlobals.brightness ?? 100,
                 globalContrast: loadedGlobals.contrast ?? 100,
                 globalInvert: loadedGlobals.invert ?? 0,
                 globalFlipX: loadedGlobals.flipX ?? false,
                 globalFlipY: loadedGlobals.flipY ?? false,
                 speed: loadedGlobals.speed ?? 1.0,
                 bgRemoval: loadedGlobals.bgRemoval ?? { type: 'none', color: '#00ff00', tolerance: 50 }
              } : null;
              
              pushInitialState(parsedFrames, mappedGlobals);
              
              if (parsedFrames.length === 1) setActiveTab('convert');
              else { setActiveTab('global'); setIsPlaying(false); }
          }
          setTimeout(() => { isRestoring.current = false; }, 50);
        } catch (err) {
          setError(t('exportFailed'));
        } finally { 
          setIsLoading(false); 
        }
      };

      const onFileChange = (e) => { handleFileDropOrSelect(e.target.files[0], false); e.target.value = null; };
      const onReplaceFileChange = (e) => { handleFileDropOrSelect(e.target.files[0], true); e.target.value = null; };

      const convertToAnimation = () => {
        if (frames.length !== 1) return;
        isRestoring.current = true;
        const fps = 10; const frameCount = Math.max(2, Math.floor(targetSeconds * fps));
        const delay = 1000 / fps;
        const newFrames = [];
        const sourceCanvas = frames[0].canvas; const w = sourceCanvas.width; const h = sourceCanvas.height;

        for (let i = 0; i < frameCount; i++) {
          const c = document.createElement('canvas'); c.width = w; c.height = h;
          const ctx = c.getContext('2d'); const p = frameCount > 1 ? i / (frameCount - 1) : 0;
          ctx.save();
          if (convertEffect === 'hue') ctx.filter = `hue-rotate(${p * 360}deg)`;
          else if (convertEffect === 'pulse') ctx.globalAlpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.cos(p * Math.PI * 2)); 
          else if (convertEffect === 'spin') { ctx.translate(w/2, h/2); ctx.rotate(p * Math.PI * 2); ctx.translate(-w/2, -h/2); } 
          else if (convertEffect === 'zoom') { const s = 1.0 + 0.2 * Math.sin(p * Math.PI * 2); ctx.translate(w/2, h/2); ctx.scale(s, s); ctx.translate(-w/2, -h/2); }
          ctx.drawImage(sourceCanvas, 0, 0); ctx.restore();
          newFrames.push(buildFrameObj(c, delay));
        }
        
        setFrames(newFrames); setCurrentFrameIndex(0); setSelectedKeyframe(null);
        pushInitialState(newFrames); setActiveTab('edit'); setIsPlaying(false);
        setTimeout(() => { isRestoring.current = false; }, 50);
      };

      const handleAddFramesByTime = () => {
        if (frames.length === 0 || addSecondsInput <= 0) return;
        const totalMs = addSecondsInput * 1000;
        const frameCountToAdd = Math.max(1, Math.round(addSecondsInput * 10)); 
        const delayPerFrame = Math.round(totalMs / frameCountToAdd);

        isRestoring.current = true;
        setFrames(prev => {
            const newFrames = [...prev];
            const targetFrame = addPosition === 'start' ? newFrames[0] : newFrames[newFrames.length - 1];

            const addedFrames = Array.from({ length: frameCountToAdd }).map(() => {
                const c = document.createElement('canvas');
                c.width = targetFrame.canvas.width;
                c.height = targetFrame.canvas.height;
                c.getContext('2d', {willReadFrequently: true}).drawImage(targetFrame.canvas, 0, 0);

                return {
                    canvas: c,
                    delay: delayPerFrame,
                    customFilters: { ...targetFrame.customFilters },
                    keyframes: { opacity: false, scale: false, rotate: false, translate: false, color: false }, 
                    easings: { ...targetFrame.easings }
                };
            });

            if (addPosition === 'start') {
                return [...addedFrames, ...newFrames];
            } else {
                return [...newFrames, ...addedFrames];
            }
        });
        
        if (addPosition === 'start') {
            setCurrentFrameIndex(prev => prev + frameCountToAdd);
            setSelectedFrames(prev => prev.map(idx => idx + frameCountToAdd));
        }
        setTimeout(() => { isRestoring.current = false; }, 50);
      };

      const handleAddKeyframeCurrent = (trackId) => {
        isRestoring.current = true;
        setFrames(prevFrames => {
            const newFrames = prevFrames.map(f => ({...f, customFilters: {...f.customFilters}, keyframes: {...f.keyframes}}));
            if (!newFrames[currentFrameIndex].keyframes[trackId]) {
                const rawInterpolated = getRawInterpolatedFilters(prevFrames, currentFrameIndex);
                TRACK_PROPS[trackId].forEach(p => {

        const h = Math.max(1, Math.round(orgH * exportConfig.scale));

        const tempCanvas = document.createElement('canvas'); tempCanvas.width = w; tempCanvas.height = h;
        const ctx = tempCanvas.getContext('2d', { willReadFrequently: true });

        if (fillBgColor) {
            ctx.fillStyle = fillBgColor;
            ctx.fillRect(0, 0, w, h);
        }

        const processedChromaCanvas = (bgRemoval.type !== 'none' && chromaCache.current.canvases[baseIndex]) ? chromaCache.current.canvases[baseIndex] : frame.canvas;
        const { opacity, filterString, rotate, translateX, translateY, scale } = getFinalRenderFilters(frames, floatIndex);
        
        ctx.globalAlpha = opacity; ctx.filter = filterString;
        ctx.scale(exportConfig.scale, exportConfig.scale);
        ctx.translate(orgW/2 + translateX, orgH/2 + translateY); 
        ctx.rotate((rotate * Math.PI) / 180); 
        ctx.scale(scale * (globalFlipX ? -1 : 1), scale * (globalFlipY ? -1 : 1));
        ctx.translate(-orgW/2, -orgH/2);
        
        ctx.drawImage(processedChromaCanvas, 0, 0);
        return { canvas: tempCanvas, ctx, w, h }; 
      };

      const handleConfirmExport = async () => {
        setIsExporting(true);
        setExportProgress(0);
        try {
            await new Promise(resolve => setTimeout(resolve, 50));
            
            // --- JSON Export ---
            if (exportConfig.format === 'json') {
                const outJsonData = {
                    metadata: {
                        version: "2.0",
                        format: "Motion Image Editor Export",
                        frameCount: frames.length,
                        totalDuration: frames.reduce((sum, f) => sum + f.delay, 0)
                    },
                    globals: {
                        opacity: globalOpacity, hue: globalHue, saturation: globalSaturation, 
                        brightness: globalBrightness, contrast: globalContrast, invert: globalInvert,
                        flipX: globalFlipX, flipY: globalFlipY, speed: speed, bgRemoval
                    },
                    frames: frames.map((f, i) => ({
                        index: i,
                        delay: f.delay,
                        filters: f.customFilters,
                        keyframes: f.keyframes,
                        easings: f.easings,
                        image: f.canvas.toDataURL('image/png')
                    }))
                };
                const blob = new Blob([JSON.stringify(outJsonData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${originalFileName}_project.json`;
                a.click();
                URL.revokeObjectURL(url);
                setIsExportModalOpen(false);
                setIsExporting(false);
                return;
            }

            const exportPoints = [];
            let totalDuration = frames.reduce((sum, f) => sum + f.delay, 0);
            if (totalDuration === 0) totalDuration = 1000;

            if (exportConfig.frameMode === 'original' || frames.length <= 1) {
                frames.forEach((f, idx) => {
                    exportPoints.push({ baseIndex: idx, floatIndex: idx, delay: f.delay / speed });
                });
            } else {
                const N = Math.max(2, exportConfig.customFrameCount);
                const realDuration = totalDuration / speed;
                const dt = realDuration / N; 
                
                for (let i = 0; i < N; i++) {
                    const targetTime = i * (totalDuration / N); 
                    let acc = 0;
                    let baseIdx = frames.length - 1;
                    let floatIdx = frames.length - 1;
                    for (let j = 0; j < frames.length; j++) {
                        if (targetTime >= acc && targetTime <= acc + frames[j].delay) { 
                            baseIdx = j; 
                            floatIdx = j + ((targetTime - acc) / Math.max(1, frames[j].delay));
                            break; 
                        }
                        acc += frames[j].delay;
                    }
                    exportPoints.push({ baseIndex: baseIdx, floatIndex: floatIdx, delay: dt });
                }
            }

            // --- WEBM Export (即時錄製模式) ---
            if (exportConfig.format === 'webm-video') {
                const { w: exportW, h: exportH } = getExportCanvasForFrame(exportPoints[0].baseIndex, exportPoints[0].floatIndex);
                const canvas = document.createElement('canvas');
                canvas.width = exportW; canvas.height = exportH;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = exportConfig.bgColor || '#ffffff';
                ctx.fillRect(0, 0, exportW, exportH);

                const stream = canvas.captureStream(); 
                const options = { mimeType: 'video/webm; codecs=vp9' };
                const mime = MediaRecorder.isTypeSupported(options.mimeType) ? options.mimeType : 'video/webm';
                const recorder = new MediaRecorder(stream, { mimeType: mime });
                
                const chunks = [];
                recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                
                recorder.start();

                let i = 0;
                const drawNextFrame = () => {
                    if (i >= exportPoints.length) {
                        setTimeout(() => {
                            if(recorder.state !== 'inactive') recorder.stop();
                        }, 50); 
                        return;
                    }
                    
                    const pt = exportPoints[i];
                    const exportCtx = getExportCanvasForFrame(pt.baseIndex, pt.floatIndex, exportConfig.bgColor).ctx;
                    ctx.drawImage(exportCtx.canvas, 0, 0);
                    
                    setExportProgress(Math.round((i / exportPoints.length) * 100));
                    i++;
                    setTimeout(drawNextFrame, pt.delay);
                };
                
                drawNextFrame();

                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: mime });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `${originalFileName}.webm`; a.click();
                    URL.revokeObjectURL(url);
                    setIsExportModalOpen(false);
                    setIsExporting(false);
                    setExportProgress(0);
                };
                return; 
            }

            let gifencModule;
            if (exportConfig.format === 'gif') {
                gifencModule = await import('https://esm.sh/gifenc@1.0.3');
            }

            const imgs = [];
            const delays = [];
            let exportW = 0, exportH = 0;

            let gif;
            if (exportConfig.format === 'gif') gif = gifencModule.GIFEncoder();
            
            const zipData = {};
            const isJpeg = exportConfig.format === 'zip-jpg';
            const isWebp = exportConfig.format === 'zip-webp';
            const needsFillBg = exportConfig.format === 'gif' || isJpeg;

            for (let i = 0; i < exportPoints.length; i++) {
                const pt = exportPoints[i];
                const { ctx, w, h, canvas } = getExportCanvasForFrame(pt.baseIndex, pt.floatIndex, needsFillBg ? exportConfig.bgColor : null);
                if (i === 0) { exportW = w; exportH = h; }

                setExportProgress(Math.round((i / exportPoints.length) * 50));

                const imgData = ctx.getImageData(0, 0, exportW, exportH);
                const pixels = new Uint8Array(imgData.data); 

                if (exportConfig.format === 'apng') {
                    imgs.push(pixels.buffer); 
                    delays.push(pt.delay);
                } else if (exportConfig.format === 'gif') {
                    const cnum = exportConfig.compression === 0 ? 256 : exportConfig.compression;
                    const palette = gifencModule.quantize(pixels, cnum);
                    const index = gifencModule.applyPalette(pixels, palette);
                    gif.writeFrame(index, exportW, exportH, { palette, delay: pt.delay });
                } else {
                    const mimeType = isJpeg ? 'image/jpeg' : (isWebp ? 'image/webp' : 'image/png');
                    const ext = isJpeg ? 'jpg' : (isWebp ? 'webp' : 'png');
                    const quality = (isJpeg || isWebp) ? (exportConfig.quality / 100) : undefined;
                    const buffer = await new Promise(resolve => {
                        canvas.toBlob(blob => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(new Uint8Array(reader.result));
                            reader.readAsArrayBuffer(blob);
                        }, mimeType, quality);
                    });
                    const idxStr = String(i + 1).padStart(4, '0');
                    zipData[`frame_${idxStr}.${ext}`] = buffer;
                }
            }

            setExportProgress(75);

            let blob;
            let filenameExt;
            if (exportConfig.format === 'apng') {
                let cnum = parseInt(exportConfig.compression) || 0;
                let apngBuffer = UPNG.encode(imgs, exportW, exportH, cnum, delays);
                
                if (!isLooping) {
                   const crcTable = new Uint32Array(256);
                   for (let i = 0; i < 256; i++) {
                      let c = i;
                      for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                      crcTable[i] = c;
                   }
                   const crc32 = (buf, off, len) => {
                      let crc = 0 ^ (-1);
                      for (let i = 0; i < len; i++) crc = (crc >>> 8) ^ crcTable[(crc ^ buf[off + i]) & 0xFF];
                      return (crc ^ (-1)) >>> 0;
                   };
                   const view = new DataView(apngBuffer);
                   const uint8 = new Uint8Array(apngBuffer);
                   const length = view.byteLength;
                   let offset = 8;
                   while (offset < length) {
                      const chunkLen = view.getUint32(offset);
                      const chunkType = String.fromCharCode(uint8[offset+4], uint8[offset+5], uint8[offset+6], uint8[offset+7]);
                      if (chunkType === 'acTL') {
                         view.setUint32(offset + 12, 1); 
                         const newCrc = crc32(uint8, offset + 4, chunkLen + 4);
                         view.setUint32(offset + 8 + chunkLen, newCrc);
                         break;
                      }
                      offset += 8 + chunkLen + 4;
                   }
                }
                blob = new Blob([apngBuffer], { type: 'image/apng' });
                filenameExt = 'apng.png';
            } else if (exportConfig.format === 'gif') {
                gif.finish();
                blob = new Blob([gif.bytesView()], { type: 'image/gif' });
                filenameExt = 'gif';
            } else {
                const zipped = fflate.zipSync(zipData);
                blob = new Blob([zipped], { type: 'application/zip' });
                filenameExt = 'frames.zip';
            }

            setExportProgress(100);

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${originalFileName}_output.${filenameExt}`;
            a.click();
            URL.revokeObjectURL(url);
            setIsExportModalOpen(false);
            
        } catch (e) { 
            console.error(e);
            setError(t('exportFailed')); 
        } finally { 
            setIsExporting(false); 
            setExportProgress(0);
        }
      };

      const isJsonSelected = exportConfig.format === 'json';

      return (
        <div 
          className="flex flex-col h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans overflow-hidden select-none relative transition-colors duration-300"
          onDragOver={(e) => { 
            e.preventDefault(); 
            if (e.dataTransfer.types && Array.from(e.dataTransfer.types).includes("Files")) {
              setIsDragOver(true); 
            }
          }}
          onDragLeave={(e) => { 
            e.preventDefault(); 
            if (!e.currentTarget.contains(e.relatedTarget)) setIsDragOver(false);
          }}
          onDrop={(e) => { 
            e.preventDefault(); 
            setIsDragOver(false);
            if (!isAppReady) return;
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
              const file = e.dataTransfer.files[0];
              handleFileDropOrSelect(file, frames.length > 0);
            }
          }}
        >
          {/* 全域拖曳換圖覆蓋層 */}
          {isDragOver && (
            <div className="absolute inset-0 bg-purple-600/20 backdrop-blur-sm z-[100] flex items-center justify-center border-[6px] border-purple-500 border-dashed pointer-events-none transition-all duration-300">
              <div className="bg-white dark:bg-slate-800 px-12 py-10 rounded-3xl shadow-2xl flex flex-col items-center gap-4 transform scale-105">
                <ImagePlus className="w-20 h-20 text-purple-600 dark:text-purple-400 animate-bounce" />
                <span className="text-purple-700 dark:text-purple-300 font-black text-3xl tracking-wide">{frames.length > 0 ? t('replace') : t('importBtn')}</span>
              </div>
            </div>
          )}

          {/* Export Modal */}
          {isExportModalOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
              <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl max-w-[420px] w-full overflow-hidden flex flex-col animate-fade-in">
                <div className="px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50">
                  <h3 className="font-bold text-lg text-slate-800 dark:text-slate-100 flex items-center gap-2"><FileOutput className="w-5 h-5 text-blue-500"/> {t('exportSettingsTitle')}</h3>
                  <button onClick={() => setIsExportModalOpen(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><X className="w-5 h-5"/></button>
                </div>
                
                <div className="p-6 space-y-5 overflow-y-auto max-h-[70vh]">
                  {/* Format */}
                  <div>
                    <label className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block">{t('format')}</label>
                    <select value={exportConfig.format} onChange={e => setExportConfig({...exportConfig, format: e.target.value})} className="w-full p-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none">
                      <option value="apng">{t('fmtApng')}</option>
                      <option value="webm-video">{t('fmtWebm')}</option>
                      <option value="gif">{t('fmtGif')}</option>
                      <option value="json">{t('fmtJson')}</option>
                      <option value="zip-png">{t('fmtZipPng')}</option>
                      <option value="zip-jpg">{t('fmtZipJpg')}</option>
                      <option value="zip-webp">{t('fmtZipWebp')}</option>
                    </select>
                  </div>
                  
                  {/* Compression & Quality */}
                  {['apng', 'gif'].includes(exportConfig.format) && (
                    <div>
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block">{t('colors')}</label>
                      <select value={exportConfig.compression} onChange={e => setExportConfig({...exportConfig, compression: parseInt(e.target.value)})} className="w-full p-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value={0}>{t('compLossless')}</option>
                        <option value={256}>{t('comp256')}</option>
                        <option value={128}>{t('comp128')}</option>
                        <option value={64}>{t('comp64')}</option>
                        <option value={32}>{t('comp32')}</option>
                        <option value={16}>{t('comp16')}</option>
                      </select>
                    </div>
                  )}

                  {['zip-jpg', 'zip-webp'].includes(exportConfig.format) && (
                    <div>
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block">{t('qualityLabel')} ({exportConfig.quality}%)</label>
                      <input type="range" min="1" max="100" value={exportConfig.quality} onChange={e => setExportConfig({...exportConfig, quality: parseInt(e.target.value)})} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer dark:bg-slate-700 accent-blue-500" />
                    </div>
                  )}

                  {/* BG Color (Visible for GIF / JPEG) */}
                  {['gif', 'zip-jpg'].includes(exportConfig.format) && (
                    <div>
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block">{t('bgColor')}</label>
                      <div className="flex items-center gap-3">
                        <input type="color" value={exportConfig.bgColor} onChange={e => setExportConfig({...exportConfig, bgColor: e.target.value})} className="w-10 h-10 rounded border-0 p-0 cursor-pointer" />
                        <span className="text-sm font-mono text-slate-600 dark:text-slate-300">{exportConfig.bgColor.toUpperCase()}</span>
                      </div>
                    </div>
                  )}

                  {/* Scale */}
                  {!isJsonSelected && (
                    <div>
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 block">{t('outScale')}</label>
                      <select value={exportConfig.scale} onChange={e => setExportConfig({...exportConfig, scale: parseFloat(e.target.value)})} className="w-full p-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value={1.0}>{t('size100')}</option>
                        <option value={0.75}>{t('size75')}</option>
                        <option value={0.5}>{t('size50')}</option>
                        <option value={0.25}>{t('size25')}</option>
                      </select>
                    </div>
                  )}

                  {/* Frame Count */}
                  {frames.length > 1 && !isJsonSelected && (
                    <div>
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 block">{t('outFrames')}</label>
                      <div className="flex flex-col gap-3">
                        <label className="flex items-center gap-2 text-sm cursor-pointer p-2 rounded-lg border border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                          <input type="radio" name="fmode" checked={exportConfig.frameMode === 'original'} onChange={() => setExportConfig({...exportConfig, frameMode: 'original'})} className="w-4 h-4 text-blue-600" />
                          <span className="text-slate-700 dark:text-slate-200">{t('origFrames')} ({frames.length})</span>
                        </label>
                        <label className="flex items-center gap-2 text-sm cursor-pointer p-2 rounded-lg border border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                          <input type="radio" name="fmode" checked={exportConfig.frameMode === 'custom'} onChange={() => setExportConfig({...exportConfig, frameMode: 'custom'})} className="w-4 h-4 text-blue-600" />
                          <span className="text-slate-700 dark:text-slate-200">{t('customFrames')}</span>
                        </label>
                        {exportConfig.frameMode === 'custom' && (
                          <div className="pl-8 flex items-center gap-2">
                            <input type="number" min="2" max="500" value={exportConfig.customFrameCount} onChange={e => setExportConfig({...exportConfig, customFrameCount: parseInt(e.target.value) || 2})} className="w-20 p-1.5 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded text-sm text-center" />
                            <span className="text-xs text-slate-500 dark:text-slate-400">{t('framesUnit')}</span>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* Size Estimation */}
                  <div className="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-lg border border-blue-100 dark:border-blue-800 flex justify-between items-center">
                     <span className="text-xs font-bold text-blue-800 dark:text-blue-300">{t('estSize')}</span>
                     <span className="text-sm font-mono font-bold text-blue-600 dark:text-blue-400">{formatBytes(getEstimatedSize())}</span>
                  </div>
                  
                  {/* File Size Tip */}
                  {(!isJsonSelected && exportConfig.format !== 'webm-video' && exportConfig.scale === 1.0 && exportConfig.compression === 0) && (
                    <div className="bg-amber-50 dark:bg-amber-900/20 p-3 rounded-lg border border-amber-100 dark:border-amber-800 mt-2">
                       <span className="text-[11px] text-amber-700 dark:text-amber-300 leading-tight block">{t('exportTip')}</span>
                    </div>
                  )}
                </div>
                
                <div className="px-6 py-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 flex gap-3">
                  <button onClick={() => setIsExportModalOpen(false)} className="flex-1 py-2.5 rounded-lg font-bold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                    {t('cancel')}
                  </button>
                  <button onClick={handleConfirmExport} disabled={isExporting} className="flex-[2] py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 transition-colors flex items-center justify-center gap-2 shadow-md relative overflow-hidden">
                    {isExporting && <div className="absolute left-0 top-0 bottom-0 bg-blue-800 transition-all duration-300" style={{width: `${exportProgress}%`}}></div>}
                    <span className="relative flex items-center gap-2">
                        {isExporting ? <span className="animate-spin inline-block w-4 h-4 border-2 border-white/20 border-t-white rounded-full"></span> : <Download className="w-4 h-4"/>}
                        {isExporting ? `${t('exporting')} ${exportProgress}%` : t('confirmExport')}
                    </span>
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Header */}
          <header className="px-6 py-3 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-between shrink-0 shadow-sm z-10 transition-colors">
            <div className="flex items-center gap-4">
              <h1 className="text-xl font-bold flex items-center gap-2 text-slate-800 dark:text-slate-100">
                <ImageIcon className="w-6 h-6 text-blue-600 dark:text-blue-400" />{t('title')}
              </h1>
              {/* 快速鍵與作者提示 */}
              <div className="hidden md:flex group relative items-center justify-center bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded cursor-help">
                <a href="https://x.com/vm060460" target="_blank" rel="noopener noreferrer" className="text-[10px] font-bold text-slate-500 dark:text-slate-400 hover:text-blue-500 transition-colors mr-2 border-r border-slate-300 dark:border-slate-600 pr-2">
                  {t('author')}
                </a>
                <Keyboard className="w-4 h-4 text-slate-400 hover:text-blue-500" />
                <div className="absolute left-0 top-full mt-2 w-64 bg-slate-800 dark:bg-slate-700 text-white text-xs rounded-lg p-4 shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50">
                  <p className="font-bold mb-2 border-b border-slate-600 pb-1">{t('shortcuts')}</p>
                  <ul className="space-y-2 text-slate-300">
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">Space</kbd></span> <span>{t('playPause')}</span></li>
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">←</kbd> / <kbd className="bg-slate-900 px-1 rounded">→</kbd></span> <span>{t('prevNext')}</span></li>
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">Del</kbd></span> <span>{t('delKey')}</span></li>
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">Ctrl+Z</kbd></span> <span>{t('undo')}</span></li>
                    <li className="flex justify-between"><span><kbd className="bg-slate-900 px-1 rounded">Ctrl+Y</kbd></span> <span>{t('redo')}</span></li>
                  </ul>
                </div>
              </div>
            </div>

            <div className="flex items-center gap-2">
              <div className="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg p-1 mr-2 border border-slate-200 dark:border-slate-700">
                 <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-1 rounded text-slate-500 hover:text-amber-500 dark:hover:text-amber-400">
                    {theme === 'light' ? <Moon className="w-4 h-4"/> : <Sun className="w-4 h-4"/>}
                 </button>
                 <div className="w-px h-4 bg-slate-300 dark:bg-slate-600 mx-1"></div>
                 <select value={lang} onChange={(e) => setLang(e.target.value)} className="bg-transparent text-xs text-slate-600 dark:text-slate-300 outline-none font-bold cursor-pointer">
                    <option value="zh-TW">繁體中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                 </select>
              </div>

              {frames.length > 0 && (
                <div className="flex items-center gap-2">
                  {!isCropMode && (
                    <div className="flex gap-2">
                      <button onClick={() => {setIsGridView(!isGridView); setIsPlaying(false);}} className={`flex items-center gap-1 text-sm px-3 py-1.5 rounded-md font-medium transition-colors ${isGridView ? 'bg-indigo-600 text-white shadow-inner' : 'bg-indigo-100 dark:bg-indigo-900/50 hover:bg-indigo-200 text-indigo-700 dark:text-indigo-300'}`}>
                        <LayoutGrid className="w-4 h-4"/> {isGridView ? t('canvasView') : t('gridView')}
                      </button>
                      {!isGridView && (
                        <>
                          <button onClick={() => document.getElementById('replace-upload').click()} className="flex items-center gap-1 text-sm bg-purple-100 dark:bg-purple-900/50 hover:bg-purple-200 text-purple-700 dark:text-purple-300 px-3 py-1.5 rounded-md font-medium transition-colors">
                            <ImagePlus className="w-4 h-4"/> {t('replace')}
                          </button>
                          <button onClick={() => { setIsCropMode(true); setIsPlaying(false); setCropRect({x:0, y:0, w:frames[0].canvas.width, h:frames[0].canvas.height}); }} className="flex items-center gap-1 text-sm bg-blue-100 dark:bg-blue-900/50 hover:bg-blue-200 text-blue-700 dark:text-blue-300 px-3 py-1.5 rounded-md font-medium transition-colors">
                            <Crop className="w-4 h-4"/> {t('cropExpand')}
                          </button>
                        </>
                      )}
                    </div>
                  )}
                  <div className="flex items-center gap-1 border-x border-slate-200 dark:border-slate-700 px-3 mx-1">
                    <button onClick={undo} disabled={historyPointer <= 0} className="p-1.5 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors disabled:opacity-30"><Undo2 className="w-4 h-4" /></button>
                    <button onClick={redo} disabled={historyPointer >= history.length - 1} className="p-1.5 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors disabled:opacity-30"><Redo2 className="w-4 h-4" /></button>
                  </div>
                  <button onClick={() => { setFrames([]); setIsPlaying(false); setActiveTab('global'); setHistory([]); setHistoryPointer(-1); setIsGridView(false); chromaCache.current = {bgStateStr:'', canvases:[]}; }} className="text-sm text-slate-500 dark:text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors font-medium px-3 py-1 rounded-md hover:bg-red-50 dark:hover:bg-red-900/20">{t('clear')}</button>
                </div>
              )}
            </div>
          </header>

          <main className="flex-1 flex overflow-hidden flex-col md:flex-row relative">
            {(isLoading || isExporting || !isAppReady) && (
              <div className="absolute inset-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p className="mt-4 text-blue-700 font-bold text-lg shadow-white drop-shadow-md">{t('exporting')}</p>
              </div>
            )}

            {/* 左側：主要畫布或網格視圖 */}
            <div className="flex-1 flex flex-col min-w-0 bg-slate-100 dark:bg-slate-800/50 relative">
              
              {isGridView ? (
                <div className="flex-1 flex flex-col bg-slate-100 dark:bg-slate-900 overflow-hidden">
                  {/* 網格管理工具列 */}
                  <div className="bg-white dark:bg-slate-800 px-6 py-3 border-b border-slate-200 dark:border-slate-700 flex flex-wrap items-center justify-between shadow-sm z-10 gap-4">
                    <div className="flex items-center gap-3">
                      <span className="text-sm font-bold text-slate-700 dark:text-slate-200">{t('selected')} {selectedFrames.length} / {frames.length} {t('frames')}</span>
                      <button onClick={() => setSelectedFrames(frames.map((_,i)=>i))} className="text-xs bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded hover:bg-slate-200 dark:hover:bg-slate-600">{t('selectAll')}</button>
                      <button onClick={() => setSelectedFrames([])} className="text-xs bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded hover:bg-slate-200 dark:hover:bg-slate-600">{t('deselect')}</button>
                      <div className="border-l border-slate-200 dark:border-slate-600 h-4 mx-1"></div>
                      <button onClick={handleDuplicateSelected} disabled={selectedFrames.length===0} className="text-xs bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 px-2 py-1 rounded disabled:opacity-50 flex items-center"><Copy className="w-3 h-3 mr-1"/> {t('copySelected')}</button>
                      <button onClick={handleDeleteSelectedFrames} disabled={selectedFrames.length===0} className="text-xs bg-red-50 dark:bg-red-900/40 text-red-600 dark:text-red-400 px-2 py-1 rounded disabled:opacity-50 flex items-center"><X className="w-3 h-3 mr-1"/> {t('delSelected')}</button>
                      <div className="border-l border-slate-200 dark:border-slate-600 h-4 mx-1"></div>
                      <button onClick={handleReverseFrames} className="text-xs bg-orange-50 dark:bg-orange-900/40 text-orange-600 dark:text-orange-400 px-2 py-1 rounded flex items-center font-bold"><ArrowLeftRight className="w-3 h-3 mr-1"/> {t('reverseAll')}</button>
                    </div>
                    
                    <div className="flex items-center gap-4">
                      {/* 加入時間長度區塊 */}
                      <div className="flex items-center gap-2 border-l pl-4 border-slate-200 dark:border-slate-700">
                         <span className="text-xs font-bold text-slate-600 dark:text-slate-300">{t('addTimeLen')}:</span>
                         <input type="number" value={addSecondsInput} onChange={(e)=>setAddSecondsInput(Number(e.target.value))} min="0.1" step="0.1" className="w-14 border dark:border-slate-600 dark:bg-slate-700 rounded px-1 py-0.5 text-sm" />
                         <span className="text-xs text-slate-500">s</span>
                         <select value={addPosition} onChange={(e)=>setAddPosition(e.target.value)} className="text-xs border dark:border-slate-600 dark:bg-slate-700 rounded px-1 py-1">
                           <option value="start">{t('addStart')}</option>
                           <option value="end">{t('addEnd')}</option>
                         </select>
                         <button onClick={handleAddFramesByTime} className="text-xs bg-purple-100 dark:bg-purple-900/50 text-purple-700 dark:text-purple-400 px-2 py-1 rounded hover:bg-purple-200 shadow-sm">{t('insertFrames')}</button>
                      </div>

                      <div className="flex items-center gap-2 border-l pl-4 border-slate-200 dark:border-slate-700">
                         <span className="text-xs font-bold text-slate-600 dark:text-slate-300">{t('selectedDelay')}:</span>
                         <input type="number" value={batchDelayInput} onChange={(e)=>setBatchDelayInput(Number(e.target.value))} className="w-14 border dark:border-slate-600 dark:bg-slate-700 rounded px-1 py-0.5 text-sm" />
                         <span className="text-xs text-slate-500">ms</span>
                         <button onClick={()=>applyBatchDelay(batchDelayInput, false)} disabled={selectedFrames.length===0} className="text-xs bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 px-2 py-1 rounded disabled:opacity-50">{t('set')}</button>
                      </div>
                    </div>
                  </div>

                  {/* 網格區塊 */}
                  <div className="flex-1 overflow-y-auto p-6 checkered-bg-light dark:checkered-bg-dark">
                    <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-4 auto-rows-max">
                      {frames.map((f, i) => {
                        const isSelected = selectedFrames.includes(i);
                        return (
                           <div 
                              key={`grid-${i}-${f.delay}`}
                              className={`relative aspect-square bg-white dark:bg-slate-800 border-2 rounded-lg p-1 flex flex-col items-center justify-between cursor-grab transition-all shadow-sm
                                ${isSelected ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/30 ring-2 ring-blue-300 ring-offset-1 dark:ring-offset-slate-900 scale-105' : 'border-slate-300 dark:border-slate-600 hover:border-blue-300'}
                              `}
                              draggable
                              onClick={(e) => handleGridFrameClick(e, i)}
                              onDragStart={(e) => {
                                 if (!selectedFrames.includes(i)) setSelectedFrames([i]);
                                 e.dataTransfer.effectAllowed = "move";
                              }}
                              onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; }}
                              onDrop={(e) => handleGridDrop(e, i)}
                           >
                              <span className="absolute top-1 left-1.5 text-[9px] font-mono font-bold text-slate-500 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 px-1 rounded">{i}</span>
                              <div className="w-full h-full flex items-center justify-center p-1 mt-2 pointer-events-none">
                                 <FrameThumbnail sourceCanvas={f.canvas} />
                              </div>
                              <span className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mt-1 pointer-events-none">{f.delay}ms</span>
                           </div>
                        )
                      })}
                    </div>
                  </div>
                </div>
              ) : (
                <div className={`flex-1 relative flex items-center justify-center p-4 md:p-8 checkered-bg-light dark:checkered-bg-dark overflow-hidden`}>
                  {error && (<div className="absolute top-8 left-1/2 transform -translate-x-1/2 bg-red-100 text-red-700 px-4 py-3 rounded-lg flex items-center gap-2 shadow-md z-40 border border-red-200 text-sm"><AlertCircle className="w-5 h-5" /> {error}</div>)}

                  {frames.length > 0 ? (
                    <div className="relative w-full h-full flex items-center justify-center pointer-events-none">
                      {/* 精準對位容器 */}
                      <div className="relative pointer-events-auto shadow-2xl" style={{ 
                          aspectRatio: `${frames[0].canvas.width} / ${frames[0].canvas.height}`, 
                          maxWidth: '100%', 
                          maxHeight: '100%' 
                        }}>
                        <canvas ref={canvasRef} className="w-full h-full object-contain" />
                        
                        {/* 裁切覆蓋層 */}
                        {isCropMode && (
                          <div 
                            ref={overlayRef}
                            className="absolute inset-0 z-30 cursor-crosshair pointer-events-auto"
                            onMouseDown={handleCropMouseDown}
                          >
                            <div className="absolute bg-blue-500/20 border-2 border-blue-500 shadow-[0_0_0_9999px_rgba(0,0,0,0.6)]" 
                                 style={{
                                   left: `${(cropRect.x / frames[0].canvas.width) * 100}%`, 
                                   top: `${(cropRect.y / frames[0].canvas.height) * 100}%`, 
                                   width: `${(cropRect.w / frames[0].canvas.width) * 100}%`, 
                                   height: `${(cropRect.h / frames[0].canvas.height) * 100}%`
                                 }}
                            >
                              <div className="absolute -top-1 -left-1 w-2 h-2 bg-white border border-blue-600"></div><div className="absolute -top-1 -right-1 w-2 h-2 bg-white border border-blue-600"></div>
                              <div className="absolute -bottom-1 -left-1 w-2 h-2 bg-white border border-blue-600"></div><div className="absolute -bottom-1 -right-1 w-2 h-2 bg-white border border-blue-600"></div>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  ) : (
                    <div className={`border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-3xl p-8 md:p-16 text-center bg-white/60 dark:bg-slate-800/60 shadow-sm w-full max-w-lg cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 dark:hover:bg-blue-900/20 transition-all`} onClick={() => isAppReady && document.getElementById('file-upload').click()}>
                      <div className="bg-blue-100 dark:bg-blue-900/50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6"><Upload className="w-8 h-8 text-blue-600 dark:text-blue-400" /></div>
                      <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-200 mb-2">{t('importBtn')}</h2>
                      <p className="text-slate-500 dark:text-slate-400">{t('dragDrop')}</p>
                    </div>
                  )}

                  {/* 裁切/擴展控制面板 */}
                  {isCropMode && (
                    <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-white dark:bg-slate-800 p-4 rounded-xl shadow-2xl z-40 border border-slate-200 dark:border-slate-700 flex items-center gap-4">
                      <div className="flex gap-2">
                        <div className="flex flex-col"><label className="text-[10px] text-slate-500 dark:text-slate-400">X</label><input type="number" value={Math.round(cropRect.x)} onChange={(e)=>setCropRect({...cropRect, x: Number(e.target.value)})} className="w-16 border dark:border-slate-600 dark:bg-slate-700 rounded p-1 text-sm"/></div>
                        <div className="flex flex-col"><label className="text-[10px] text-slate-500 dark:text-slate-400">Y</label><input type="number" value={Math.round(cropRect.y)} onChange={(e)=>setCropRect({...cropRect, y: Number(e.target.value)})} className="w-16 border dark:border-slate-600 dark:bg-slate-700 rounded p-1 text-sm"/></div>
                        <div className="flex flex-col"><label className="text-[10px] text-slate-500 dark:text-slate-400">W</label><input type="number" value={Math.round(cropRect.w)} onChange={(e)=>setCropRect({...cropRect, w: Number(e.target.value)})} className="w-16 border dark:border-slate-600 dark:bg-slate-700 rounded p-1 text-sm"/></div>
                        <div className="flex flex-col"><label className="text-[10px] text-slate-500 dark:text-slate-400">H</label><input type="number" value={Math.round(cropRect.h)} onChange={(e)=>setCropRect({...cropRect, h: Number(e.target.value)})} className="w-16 border dark:border-slate-600 dark:bg-slate-700 rounded p-1 text-sm"/></div>
                      </div>
                      
                      <div className="flex flex-col gap-1 border-l dark:border-slate-700 pl-4 justify-center items-center">
                        <span className="text-[10px] text-slate-500 dark:text-slate-400 font-bold mb-1">{t('alignMode')}</span>
                        <div className="flex gap-1 bg-slate-100 dark:bg-slate-700 p-1 rounded-lg">
                          <button onClick={() => alignCropRect('left')} className="p-1 hover:bg-white dark:hover:bg-slate-600 rounded hover:text-blue-600"><AlignLeft className="w-4 h-4"/></button>
                          <button onClick={() => alignCropRect('center')} className="p-1 hover:bg-white dark:hover:bg-slate-600 rounded hover:text-blue-600"><AlignCenter className="w-4 h-4"/></button>
                          <button onClick={() => alignCropRect('right')} className="p-1 hover:bg-white dark:hover:bg-slate-600 rounded hover:text-blue-600"><AlignRight className="w-4 h-4"/></button>
                        </div>
                      </div>

                      <div className="flex flex-col gap-1 border-l dark:border-slate-700 pl-4">
                        <button onClick={applyCropAndResize} className="px-4 py-1.5 bg-blue-600 text-white rounded text-sm font-bold hover:bg-blue-700">{t('applyCrop')}</button>
                        <button onClick={()=>setIsCropMode(false)} className="px-4 py-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded text-xs hover:bg-slate-200 dark:hover:bg-slate-600">{t('cancel')}</button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ===== 多軌道 AE Style 關鍵影格時間軸 ===== */}
              {frames.length > 1 && !isCropMode && !isGridView && (
                <div className="h-[250px] bg-[#f8f9fa] dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 shrink-0 flex flex-col shadow-[0_-4px_15px_-3px_rgba(0,0,0,0.05)] z-20 select-none relative overflow-hidden">
                  
                  {/* 時間軸工具列 (裁切) */}
                  <div className="h-8 bg-slate-100 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-4 shrink-0">
                     <span className="text-[11px] font-bold text-slate-500 dark:text-slate-400 flex items-center gap-1"><Scissors className="w-3 h-3"/> {t('timelineTools')}</span>
                     <div className="flex gap-2">
                       <button onClick={handleTrimStart} disabled={currentFrameIndex === 0} className="text-[11px] px-2 py-1 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded text-slate-600 dark:text-slate-300 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-slate-600 disabled:opacity-50 transition-colors">{t('trimStart')}</button>
                       <button onClick={handleTrimEnd} disabled={currentFrameIndex === frames.length - 1} className="text-[11px] px-2 py-1 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded text-slate-600 dark:text-slate-300 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-slate-600 disabled:opacity-50 transition-colors">{t('trimEnd')}</button>
                     </div>
                  </div>

                  {/* 捲動區域 */}
                  <div className="flex-1 flex flex-col overflow-y-auto custom-scrollbar relative">
                      {/* 上方：影格數字標尺 */}
                      <div className="h-6 border-b border-slate-200 dark:border-slate-700 flex relative overflow-hidden px-12 bg-white dark:bg-slate-800 sticky top-0 z-30 shrink-0">
                        {Array.from({ length: Math.ceil(frames.length / 10) + 1 }).map((_, i) => {
                          const frameNum = i * 10;
                          if (frameNum >= frames.length) return null;
                          return (
                            <div key={i} className="absolute top-0 bottom-0 border-l border-slate-300 dark:border-slate-600 flex items-end pb-0.5" style={{ left: `calc(3rem + (100% - 6rem) * ${(frameNum / (frames.length - 1))})` }}>
                              <span className="text-[10px] text-slate-400 dark:text-slate-500 font-mono ml-1 leading-none">{frameNum}</span>
                            </div>
                          )
                        })}
                      </div>

                      {/* 下方：多軌道區塊 */}
                      <div className="flex-1 relative px-12 py-3 flex flex-col gap-1.5" ref={timelineTrackRef} onMouseDown={handleTimelineMouseDown}>
                        
                        {/* 紅色播放指標 */}
                        <div className="absolute top-0 bottom-0 w-px bg-red-500 z-40 pointer-events-none" style={{ left: `calc(3rem + (100% - 6rem) * ${(currentFrameIndex / Math.max(1, frames.length - 1))})` }}>
                          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[5px] border-l-transparent border-r-[5px] border-r-transparent border-t-[7px] border-t-red-500"></div>
                        </div>

                        {/* 內部相對容器 */}
                        <div className="relative w-full h-full flex flex-col gap-1.5">
                            {/* 影格預覽軌道 */}
                            <div className="relative h-10 bg-slate-300/30 dark:bg-slate-700/30 rounded-sm border border-slate-300 dark:border-slate-600 flex items-center mb-2">
                              <span className="absolute -left-10 text-[9px] text-slate-500 dark:text-slate-400 font-bold z-20">{t('trackFrame')}</span>
                              {frames.map((frame, idx) => {
                                const isSelected = currentFrameIndex === idx;
                                return (
                                  <div 
                                    key={`${idx}-${frame.delay}`} 
                                    className={`absolute top-0 bottom-0 flex items-center justify-center transition-all group cursor-pointer ${isSelected ? 'border-2 border-blue-500 bg-blue-500/20 z-10 scale-110 shadow-md' : 'opacity-80 hover:opacity-100'}`}
                                    style={{ left: `${(idx / (frames.length - 1)) * 100}%`, width: '28px', transform: 'translateX(-50%)' }}
                                    onMouseDown={(e) => { 
                                      e.stopPropagation(); setCurrentFrameIndex(idx); setIsPlaying(false); setActiveTab('edit'); 
                                    }}
                                  >
                                    <FrameThumbnail sourceCanvas={frame.canvas} />
                                  </div>
                                );
                              })}
                            </div>

                            {/* 特效軌道 */}
                            {TRACKS_INFO.map(track => {
                              const hasKeyframes = frames.some(f => f.keyframes[track.id]);
                              if (!hasKeyframes) return null; 

                              return (
                                <div key={track.id} className="relative h-6 bg-slate-200/50 dark:bg-slate-800/50 rounded-sm border border-slate-300 dark:border-slate-700 flex items-center animate-fade-in">
                                  <span className="absolute -left-10 text-[9px] text-slate-500 dark:text-slate-400 font-bold">{t(track.labelKey)}</span>
                                  
                                  {/* 繪製視覺化貝茲曲線 */}
                                  {renderTimelineCurves(track.id, track.stroke)}

                                  {frames.map((frame, idx) => {
                                    if (!frame.keyframes[track.id]) return null;
                                    const isKeyframeSelected = selectedKeyframe?.idx === idx && selectedKeyframe?.trackId === track.id;
                                    const isDraggingThis = draggingKeyframe?.fromIdx === idx && draggingKeyframe?.trackId === track.id;
                                    const renderIdx = isDraggingThis ? draggingKeyframe.currentIdx : idx;
                                    
                                    return (
                                      <div 
                                        key={idx} 
                                        className={`absolute top-1/2 -mt-1.5 w-3 h-3 rotate-45 cursor-grab active:cursor-grabbing hover:scale-125 transition-all z-10 
                                          ${isDraggingThis ? 'bg-blue-500 border border-blue-700 shadow-[0_0_10px_rgba(59,130,246,0.8)] scale-150 z-50' : 
                                           isKeyframeSelected ? 'bg-red-500 border border-red-700 shadow-[0_0_8px_rgba(239,68,68,0.8)] scale-125' : 
                                           `${track.color} border ${track.border} shadow-sm`}`}
                                        style={{ 
                                           left: `${(renderIdx / Math.max(1, frames.length - 1)) * 100}%`, 
                                           transform: 'translateX(-50%) translateY(-50%) rotate(45deg)',
                                           transitionDuration: isDraggingThis ? '0s' : '0.15s'
                                        }}
                                        onMouseDown={(e) => {
                                           setCurrentFrameIndex(idx); setIsPlaying(false); setActiveTab('edit');
                                           setSelectedKeyframe({ idx, trackId: track.id });
                                           handleKeyframeDrag(e, idx, track.id);
                                        }}
                                        title={`第 ${renderIdx} 格 ${track.label}特效 (Delete可刪除)`}
                                      />
                                    );
                                  })}
                                </div>
                              )
                            })}
                        </div>
                        
                        {!TRACKS_INFO.some(t => frames.some(f => f.keyframes[t.id])) && (
                          <div className="w-full text-center text-[10px] text-slate-400 mt-2 font-medium">
                             {t('noKfs')}
                          </div>
                        )}
                      </div>
                  </div>
                </div>
              )}
            </div>

            {/* 右側：控制面板 */}
            {frames.length > 0 && !isCropMode && !isGridView && (
              <div className="w-full md:w-[380px] bg-white dark:bg-slate-800 border-t md:border-t-0 md:border-l border-slate-200 dark:border-slate-700 flex flex-col shrink-0 h-1/2 md:h-full z-10 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] transition-colors">
                
                {frames.length > 1 && (
                  <div className="p-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 shrink-0 space-y-3">
                    <div className="flex items-center justify-between">
                      <h2 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest flex items-center gap-1">{t('globalCtrl')}</h2>
                      <label className="flex items-center gap-1.5 cursor-pointer group">
                        <div className={`relative w-8 h-4 rounded-full transition-colors ${isLooping ? 'bg-blue-500' : 'bg-slate-300 dark:bg-slate-600'}`}><div className={`absolute top-0.5 left-0.5 bg-white w-3 h-3 rounded-full transition-transform ${isLooping ? 'translate-x-4' : 'translate-x-0'}`}></div></div>
                        <span className="text-xs font-medium text-slate-600 dark:text-slate-300">{t('loop')}</span>
                        <input type="checkbox" className="hidden" checked={isLooping} onChange={() => setIsLooping(!isLooping)} />
                      </label>
                    </div>
                    <div className="flex items-center gap-3">
                      <button onClick={() => { if (!isPlaying && currentFrameIndex >= frames.length - 1) setCurrentFrameIndex(0); setIsPlaying(!isPlaying); }} className={`w-10 h-10 flex items-center justify-center rounded-full transition-all flex-shrink-0 shadow-md ${isPlaying ? 'bg-slate-800 dark:bg-slate-700 text-white' : 'bg-blue-600 text-white hover:bg-blue-500'}`}>
                        {isPlaying ? <Pause className="w-4 h-4 fill-current" /> : <Play className="w-4 h-4 ml-1 fill-current" />}
                      </button>
