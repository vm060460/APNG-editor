<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APNG 編輯器</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900">
  <div id="root"></div>

  <!-- 主要應用程式邏輯 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Upload, Play, Pause, Image as ImageIcon, Download, 
      AlertCircle, Archive, Layers, Globe, Undo2, Redo2, 
      Sparkles, Move, RotateCw, Eraser, Crop, Wand2, Settings2,
      SlidersHorizontal, Clock, AlignLeft, AlignCenter, AlignRight
    } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    let parseGIF, decompressFrames, UPNG, fflate;

    const DEFAULT_FILTERS = { 
      opacity: 1.0, hue: 0, saturation: 100, brightness: 100, contrast: 100, 
      invert: 0, rotate: 0, translateX: 0, translateY: 0 
    };

    // 定義各個軌道管理的屬性
    const TRACK_PROPS = {
      opacity: ['opacity'],
      rotate: ['rotate'],
      translate: ['translateX', 'translateY'],
      color: ['hue', 'saturation', 'brightness', 'contrast', 'invert']
    };

    const TRACKS_INFO = [
      { id: 'opacity', label: '透明度', color: 'bg-purple-400', border: 'border-purple-600', stroke: '#c084fc' },
      { id: 'rotate', label: '旋轉', color: 'bg-green-400', border: 'border-green-600', stroke: '#4ade80' },
      { id: 'translate', label: '位移', color: 'bg-blue-400', border: 'border-blue-600', stroke: '#60a5fa' },
      { id: 'color', label: '色彩', color: 'bg-orange-400', border: 'border-orange-600', stroke: '#fb923c' }
    ];

    // 漸變曲線計算函數 (Tweening Easing)
    const applyEasing = (p, type) => {
      if (type === 'easeIn') return p * p;
      if (type === 'easeOut') return 1 - Math.pow(1 - p, 2);
      if (type === 'easeInOut') return p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
      return p; // linear
    };

    function App() {
      const [isAppReady, setIsAppReady] = useState(false);
      const [frames, setFrames] = useState([]);
      const [originalFileName, setOriginalFileName] = useState('edited_animation');
      
      const [currentFrameIndex, setCurrentFrameIndex] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isLooping, setIsLooping] = useState(false); // 預設關閉循環
      const [speed, setSpeed] = useState(1.0);
      
      const [activeTab, setActiveTab] = useState('global');
      const [selectedEditFrame, setSelectedEditFrame] = useState(0);
      
      // 全域狀態
      const [globalOpacity, setGlobalOpacity] = useState(1.0);
      const [globalHue, setGlobalHue] = useState(0);
      const [globalSaturation, setGlobalSaturation] = useState(100);
      const [globalBrightness, setGlobalBrightness] = useState(100);
      const [globalContrast, setGlobalContrast] = useState(100);
      const [globalInvert, setGlobalInvert] = useState(0);
      const [bgRemoval, setBgRemoval] = useState({ type: 'none', color: '#00ff00', tolerance: 50 });

      // 裁切/擴展狀態
      const [isCropMode, setIsCropMode] = useState(false);
      const [cropRect, setCropRect] = useState({ x: 0, y: 0, w: 100, h: 100 });
      const cropStartRef = useRef(null);

      // 漸變特效狀態
      const [gradType, setGradType] = useState('opacity');
      const [gradEasing, setGradEasing] = useState('easeInOut'); 
      const [activeGradEffects, setActiveGradEffects] = useState({ opacity: 'opacity_fadeTo', rotate: 'rotate', translate: 'translate', color: 'color' });
      
      const [gradOpacityTarget, setGradOpacityTarget] = useState(0);
      const [gradRotStart, setGradRotStart] = useState(0);
      const [gradRotEnd, setGradRotEnd] = useState(360);
      const [gradMoveStartX, setGradMoveStartX] = useState(0);
      const [gradMoveEndX, setGradMoveEndX] = useState(1000);
      const [gradMoveStartY, setGradMoveStartY] = useState(0);
      const [gradMoveEndY, setGradMoveEndY] = useState(0);

      const [compressionLevel, setCompressionLevel] = useState(256);
      const [targetSeconds, setTargetSeconds] = useState(2);
      const [convertEffect, setConvertEffect] = useState('none');

      const [history, setHistory] = useState([]);
      const [historyPointer, setHistoryPointer] = useState(-1);
      const isRestoring = useRef(false);
      const chromaCache = useRef({ bgStateStr: '', canvases: [] }); 

      const [isLoading, setIsLoading] = useState(false);
      const [isExporting, setIsExporting] = useState(false);
      const [error, setError] = useState(null);
      
      const canvasRef = useRef(null);
      const overlayRef = useRef(null);
      const timelineTrackRef = useRef(null);
      const currentFrameIndexRef = useRef(0);

      // 初始化
      useEffect(() => {
        let isMounted = true;
        const initModules = async () => {
          try {
            const dynamicImport = new Function('url', 'return import(url)');
            const gifuctModule = await dynamicImport('https://esm.sh/gifuct-js@2.1.2?bundle');
            const upngModule = await dynamicImport('https://esm.sh/upng-js@2.1.0?bundle');
            const fflateModule = await dynamicImport('https://esm.sh/fflate@0.8.2?bundle');

            parseGIF = gifuctModule.parseGIF || gifuctModule.default?.parseGIF;
            decompressFrames = gifuctModule.decompressFrames || gifuctModule.default?.decompressFrames;
            UPNG = upngModule.default || upngModule;
            fflate = fflateModule;

            if (isMounted) setIsAppReady(true);
          } catch (err) {
            if (isMounted) setError("無法載入影像引擎。");
          }
        };
        initModules();
        return () => { isMounted = false; };
      }, []);

      useEffect(() => { currentFrameIndexRef.current = currentFrameIndex; }, [currentFrameIndex]);

      // 空白鍵播放/暫停
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.code === 'Space' && frames.length > 1 && !isCropMode) {
            const activeTag = document.activeElement?.tagName;
            if (activeTag !== 'INPUT' && activeTag !== 'TEXTAREA' && activeTag !== 'SELECT') {
              e.preventDefault();
              setIsPlaying(p => !p);
            }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [frames.length, isCropMode]);

      // 歷史紀錄管理
      const pushInitialState = (newFrames) => {
        const initialState = {
          frames: newFrames.map(f => ({ ...f, customFilters: { ...f.customFilters }, keyframes: { ...f.keyframes }, easings: { ...f.easings } })),
          globals: { globalOpacity: 1.0, globalHue: 0, globalSaturation: 100, globalBrightness: 100, globalContrast: 100, globalInvert: 0, speed: 1.0, bgRemoval: { type: 'none', color: '#00ff00', tolerance: 50 } }
        };
        setHistory([initialState]);
        setHistoryPointer(0);
      };

      useEffect(() => {
        if (frames.length === 0 || isRestoring.current || isCropMode) return;
        const timeout = setTimeout(() => {
          setHistory(prev => {
            const lastState = prev[historyPointer];
            const currentDataStr = JSON.stringify({
              f: frames.map(f => ({ f: f.customFilters, key: f.keyframes, ease: f.easings })),
              g: { globalOpacity, globalHue, globalSaturation, globalBrightness, globalContrast, globalInvert, speed, bgRemoval }
            });
            const lastDataStr = lastState ? JSON.stringify({
              f: lastState.frames.map(f => ({ f: f.customFilters, key: f.keyframes, ease: f.easings })),
              g: lastState.globals
            }) : "";

            if (currentDataStr !== lastDataStr) {
              const currentState = {
                frames: frames.map(f => ({ ...f, customFilters: { ...f.customFilters }, keyframes: { ...f.keyframes }, easings: { ...f.easings } })),
                globals: { globalOpacity, globalHue, globalSaturation, globalBrightness, globalContrast, globalInvert, speed, bgRemoval }
              };
              const newHistory = prev.slice(0, historyPointer + 1);
              newHistory.push(currentState);
              if (newHistory.length > 30) newHistory.shift();
              setHistoryPointer(newHistory.length - 1);
              return newHistory;
            }
            return prev;
          });
        }, 500);
        return () => clearTimeout(timeout);
      }, [frames, globalOpacity, globalHue, globalSaturation, globalBrightness, globalContrast, globalInvert, speed, bgRemoval, historyPointer, isCropMode]);

      const undo = () => {
        if (historyPointer > 0) {
          isRestoring.current = true;
          applyState(history[historyPointer - 1]);
          setHistoryPointer(historyPointer - 1);
          setTimeout(() => { isRestoring.current = false; }, 50);
        }
      };

      const redo = () => {
        if (historyPointer < history.length - 1) {
          isRestoring.current = true;
          applyState(history[historyPointer + 1]);
          setHistoryPointer(historyPointer + 1);
          setTimeout(() => { isRestoring.current = false; }, 50);
        }
      };

      const applyState = (state) => {
        setFrames(prevFrames => prevFrames.map((pf, i) => ({
          ...pf, 
          customFilters: state.frames[i] ? { ...state.frames[i].customFilters } : pf.customFilters,
          keyframes: state.frames[i] ? { ...state.frames[i].keyframes } : pf.keyframes,
          easings: state.frames[i] ? { ...state.frames[i].easings } : pf.easings
        })));
        setGlobalOpacity(state.globals.globalOpacity); setGlobalHue(state.globals.globalHue);
        setGlobalSaturation(state.globals.globalSaturation); setGlobalBrightness(state.globals.globalBrightness);
        setGlobalContrast(state.globals.globalContrast); setGlobalInvert(state.globals.globalInvert);
        setSpeed(state.globals.speed); setBgRemoval(state.globals.bgRemoval);
      };

      // 去背演算
      const applyChromaKey = (sourceCanvas, bgSettings) => {
        if (bgSettings.type === 'none') return sourceCanvas;
        const { type, color, tolerance } = bgSettings;
        let targetR, targetG, targetB;
        if (type === 'green') { targetR = 0; targetG = 255; targetB = 0; }
        else if (type === 'black') { targetR = 0; targetG = 0; targetB = 0; }
        else if (type === 'white') { targetR = 255; targetG = 255; targetB = 255; }
        else {
          const hex = color.replace('#', '');
          targetR = parseInt(hex.substring(0,2), 16) || 0;
          targetG = parseInt(hex.substring(2,4), 16) || 0;
          targetB = parseInt(hex.substring(4,6), 16) || 0;
        }

        const canvas = document.createElement('canvas');
        canvas.width = sourceCanvas.width; canvas.height = sourceCanvas.height;
        const ctx = canvas.getContext('2d', {willReadFrequently: true});
        ctx.drawImage(sourceCanvas, 0, 0);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
          if (data[i+3] === 0) continue; 
          const r = data[i], g = data[i+1], b = data[i+2];
          const dist = Math.sqrt(Math.pow(r-targetR, 2) + Math.pow(g-targetG, 2) + Math.pow(b-targetB, 2));
          if (dist <= tolerance) data[i+3] = 0; 
        }
        ctx.putImageData(imgData, 0, 0);
        return canvas;
      };

      // 影像解析邏輯
      const buildFrameObj = (canvas, delay) => ({
        canvas, delay, 
        customFilters: { ...DEFAULT_FILTERS }, 
        keyframes: { opacity: false, rotate: false, translate: false, color: false }, 
        easings: { opacity: 'linear', rotate: 'linear', translate: 'linear', color: 'linear' }
      });

      const gifToFrames = (buffer) => {
        const gif = parseGIF(buffer); const rawFrames = decompressFrames(gif, true);
        const w = gif.lsd.width; const h = gif.lsd.height;
        const compositedFrames = [];
        const tempCanvas = document.createElement('canvas'); tempCanvas.width = w; tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
        let previousImageData = null;

        for (let i = 0; i < rawFrames.length; i++) {
          const { patch, dims, disposalType, delay } = rawFrames[i];
          if (disposalType !== 3) previousImageData = tempCtx.getImageData(0, 0, w, h);

          if (dims.width > 0 && dims.height > 0) {
            const patchData = new ImageData(new Uint8ClampedArray(patch), dims.width, dims.height);
            const patchCanvas = document.createElement('canvas');
            patchCanvas.width = dims.width; patchCanvas.height = dims.height;
            patchCanvas.getContext('2d').putImageData(patchData, 0, 0);
            tempCtx.drawImage(patchCanvas, dims.left, dims.top);
          }

          const finalDelay = (delay || 100) < 20 ? 100 : (delay || 100);
          compositedFrames.push(buildFrameObj(cloneCanvas(tempCanvas), finalDelay));
          if (disposalType === 2) tempCtx.clearRect(dims.left, dims.top, dims.width, dims.height);
          else if (disposalType === 3 && previousImageData) tempCtx.putImageData(previousImageData, 0, 0);
        }
        return compositedFrames;
      };

      const apngToFrames = async (buffer) => {
        const img = UPNG.decode(buffer); const rgbaFrames = UPNG.toRGBA8(img);
        return rgbaFrames.map((rgba, index) => {
          const imageData = new ImageData(new Uint8ClampedArray(rgba), img.width, img.height);
          const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
          canvas.getContext('2d').putImageData(imageData, 0, 0);
          return buildFrameObj(canvas, (img.frames && img.frames[index]) ? (img.frames[index].delay || 100) : 100);
        });
      };

      const loadGenericImage = async (file) => {
        const img = new Image(); const url = URL.createObjectURL(file);
        await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = url; });
        const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0); URL.revokeObjectURL(url);
        return [buildFrameObj(canvas, 1000)];
      };

      const processFile = async (file) => {
        if (!isAppReady) return;
        try {
          setIsLoading(true); setError(null); setIsPlaying(false); isRestoring.current = true;
          
          // 解析並記錄檔名 (去除副檔名)
          const nameExtIdx = file.name.lastIndexOf('.');
          const nameWithoutExt = nameExtIdx !== -1 ? file.name.substring(0, nameExtIdx) : file.name;
          setOriginalFileName(nameWithoutExt);

          setSpeed(1.0); setGlobalOpacity(1.0); setGlobalHue(0); setGlobalSaturation(100); 
          setGlobalBrightness(100); setGlobalContrast(100); setGlobalInvert(0);
          setBgRemoval({ type: 'none', color: '#00ff00', tolerance: 50 });
          chromaCache.current = { bgStateStr: '', canvases: [] }; 
          
          const buffer = await file.arrayBuffer(); const bytes = new Uint8Array(buffer);
          let parsedFrames = [];

          if (bytes[0] === 0x47 && bytes[1] === 0x49 && bytes[2] === 0x46) parsedFrames = gifToFrames(buffer);
          else if (bytes[0] === 0x89 && bytes[1] === 0x50 && bytes[2] === 0x4E && bytes[3] === 0x47) parsedFrames = await apngToFrames(buffer);
          else parsedFrames = await loadGenericImage(file);

          setFrames(parsedFrames); setCurrentFrameIndex(0); setSelectedEditFrame(0); currentFrameIndexRef.current = 0;
          pushInitialState(parsedFrames);
          
          if (parsedFrames.length === 1) setActiveTab('convert');
          else { setActiveTab('global'); setIsPlaying(false); }
          setTimeout(() => { isRestoring.current = false; }, 50);
        } catch (err) {
          setError("檔案解析失敗，請確認格式是否正確。");
        } finally { setIsLoading(false); }
      };

      const onFileChange = (e) => { const f = e.target.files[0]; if (f) processFile(f); };
      const onDrop = (e) => { e.preventDefault(); if (!isAppReady) return; const f = e.dataTransfer.files[0]; if (f) processFile(f); };

      // 單圖轉換
      const convertToAnimation = () => {
        if (frames.length !== 1) return;
        isRestoring.current = true;
        const fps = 10; const frameCount = Math.max(2, Math.floor(targetSeconds * fps));
        const delay = 1000 / fps;
        const newFrames = [];
        const sourceCanvas = frames[0].canvas; const w = sourceCanvas.width; const h = sourceCanvas.height;

        for (let i = 0; i < frameCount; i++) {
          const c = document.createElement('canvas'); c.width = w; c.height = h;
          const ctx = c.getContext('2d'); const p = frameCount > 1 ? i / (frameCount - 1) : 0;
          ctx.save();
          if (convertEffect === 'hue') ctx.filter = `hue-rotate(${p * 360}deg)`;
          else if (convertEffect === 'pulse') ctx.globalAlpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.cos(p * Math.PI * 2)); 
          else if (convertEffect === 'spin') { ctx.translate(w/2, h/2); ctx.rotate(p * Math.PI * 2); ctx.translate(-w/2, -h/2); } 
          else if (convertEffect === 'zoom') { const s = 1.0 + 0.2 * Math.sin(p * Math.PI * 2); ctx.translate(w/2, h/2); ctx.scale(s, s); ctx.translate(-w/2, -h/2); }
          ctx.drawImage(sourceCanvas, 0, 0); ctx.restore();
          newFrames.push(buildFrameObj(c, delay));
        }
        
        setFrames(newFrames); setCurrentFrameIndex(0); setSelectedEditFrame(0); 
        pushInitialState(newFrames); setActiveTab('gradient'); setIsPlaying(false);
        setTimeout(() => { isRestoring.current = false; }, 50);
      };

      // 產生純首尾關鍵影格的特效，保留獨立軌道
      const applyGradientEffects = useCallback((effectType) => {
        setFrames(prevFrames => {
          const len = prevFrames.length;
          if (len <= 1) return prevFrames;
          const newFrames = prevFrames.map(f => ({
            ...f, 
            keyframes: { ...f.keyframes },
            easings: { ...f.easings },
            customFilters: { ...f.customFilters }
          }));
          
          const track = effectType.split('_')[0]; // opacity, rotate, translate, color
          if (!TRACK_PROPS[track]) return prevFrames;

          if (effectType.endsWith('_reset')) {
            for(let i=0; i<len; i++) {
              newFrames[i].keyframes[track] = false;
              TRACK_PROPS[track].forEach(p => newFrames[i].customFilters[p] = DEFAULT_FILTERS[p]);
            }
            return newFrames;
          }

          // 只保留首尾為關鍵影格 (針對該軌道)，清空該軌道中間的所有關鍵影格
          for(let i=1; i<len-1; i++) {
             newFrames[i].keyframes[track] = false;
          }
          newFrames[0].keyframes[track] = true;
          newFrames[len-1].keyframes[track] = true;
          newFrames[0].easings[track] = gradEasing;

          const startF = newFrames[0].customFilters;
          const endF = newFrames[len-1].customFilters;

          if (effectType === 'opacity_fadeTo') { startF.opacity = 1.0; endF.opacity = gradOpacityTarget/100; }
          else if (effectType === 'opacity_fadeFrom') { startF.opacity = gradOpacityTarget/100; endF.opacity = 1.0; }
          else if (effectType === 'opacity_pulse') {
             startF.opacity = 1.0; endF.opacity = 1.0;
             const mid = Math.floor((len-1)/2);
             newFrames[mid].keyframes.opacity = true;
             newFrames[mid].customFilters.opacity = gradOpacityTarget/100;
             newFrames[0].easings.opacity = gradEasing;
             newFrames[mid].easings.opacity = gradEasing;
          }
          
          else if (effectType === 'rotate') { startF.rotate = gradRotStart; endF.rotate = gradRotEnd; }
          
          else if (effectType === 'translate') {
            startF.translateX = gradMoveStartX; startF.translateY = gradMoveStartY;
            endF.translateX = gradMoveEndX; endF.translateY = gradMoveEndY;
          }
          
          return newFrames;
        });
      }, [gradOpacityTarget, gradRotStart, gradRotEnd, gradMoveStartX, gradMoveEndX, gradMoveStartY, gradMoveEndY, gradEasing]);

      // 即時預覽：當參數改變時自動套用 (Live Preview)
      useEffect(() => {
        if (activeTab === 'gradient' && frames.length > 1 && !isRestoring.current) {
           applyGradientEffects(activeGradEffects[gradType]);
        }
      }, [gradOpacityTarget, gradRotStart, gradRotEnd, gradMoveStartX, gradMoveEndX, gradMoveStartY, gradMoveEndY, gradEasing, activeGradEffects, gradType, applyGradientEffects]);

      const triggerExplicitGradient = (mode) => {
        const type = mode.split('_')[0];
        setGradType(type);
        setActiveGradEffects(prev => ({ ...prev, [type]: mode }));
      };

      const handleQuickMove = (direction) => {
        const w = frames[0].canvas.width;
        const h = frames[0].canvas.height;
        setGradMoveStartX(0); setGradMoveStartY(0);
        if (direction === 'right') { setGradMoveEndX(w); setGradMoveEndY(0); }
        if (direction === 'left') { setGradMoveEndX(-w); setGradMoveEndY(0); }
        if (direction === 'down') { setGradMoveEndX(0); setGradMoveEndY(h); }
        if (direction === 'up') { setGradMoveEndX(0); setGradMoveEndY(-h); }
        
        setGradType('translate');
        setActiveGradEffects(prev => ({ ...prev, translate: 'translate' }));
      };

      // == 多軌道關鍵影格插值核心 ==
      const getRawInterpolatedFilters = useCallback((allFrames, index) => {
        const interpolated = { ...DEFAULT_FILTERS };
        // 為了避免未被關鍵幀控制的屬性跳動，先載入當前格的設定作為基底
        Object.assign(interpolated, allFrames[index].customFilters);

        for (const track of ['opacity', 'rotate', 'translate', 'color']) {
          if (allFrames[index].keyframes[track]) {
            TRACK_PROPS[track].forEach(prop => { interpolated[prop] = allFrames[index].customFilters[prop]; });
            continue;
          }
          
          let prevK = null, prevIdx = -1;
          for (let i = index - 1; i >= 0; i--) {
            if (allFrames[i].keyframes[track]) { prevK = allFrames[i]; prevIdx = i; break; }
          }
          let nextK = null, nextIdx = -1;
          for (let i = index + 1; i < allFrames.length; i++) {
            if (allFrames[i].keyframes[track]) { nextK = allFrames[i]; nextIdx = i; break; }
          }

          if (prevK && nextK) {
            const p = (index - prevIdx) / (nextIdx - prevIdx);
            const t = applyEasing(p, prevK.easings[track] || 'linear');
            TRACK_PROPS[track].forEach(prop => {
              interpolated[prop] = prevK.customFilters[prop] + t * (nextK.customFilters[prop] - prevK.customFilters[prop]);
            });
          } else if (prevK) {
            TRACK_PROPS[track].forEach(prop => interpolated[prop] = prevK.customFilters[prop]);
          } else if (nextK) {
            TRACK_PROPS[track].forEach(prop => interpolated[prop] = nextK.customFilters[prop]);
          }
        }
        return interpolated;
      }, []);

      // 畫布裁切/對齊/擴大操作
      const alignCropRect = (position) => {
        if (frames.length === 0) return;
        const orgW = frames[0].canvas.width; const orgH = frames[0].canvas.height;
        setCropRect(prev => {
          const newRect = { ...prev };
          if (position === 'left') { newRect.x = 0; newRect.y = (orgH - newRect.h) / 2; }
          else if (position === 'center') { newRect.x = (orgW - newRect.w) / 2; newRect.y = (orgH - newRect.h) / 2; }
          else if (position === 'right') { newRect.x = orgW - newRect.w; newRect.y = (orgH - newRect.h) / 2; }
          return newRect;
        });
      };

      const handleCropMouseDown = (e) => {
        if (!isCropMode || !overlayRef.current) return;
        const rect = overlayRef.current.getBoundingClientRect();
        const displayW = rect.width; const actualW = frames[0].canvas.width; const scale = actualW / displayW;
        const startX = (e.clientX - rect.left) * scale; const startY = (e.clientY - rect.top) * scale;
        
        cropStartRef.current = { startX, startY, scale, rect };
        setCropRect({ x: startX, y: startY, w: 0, h: 0 });

        const onMouseMove = (moveEvent) => {
          const currentX = (moveEvent.clientX - rect.left) * scale;
          const currentY = (moveEvent.clientY - rect.top) * scale;
          setCropRect({
            x: Math.min(startX, currentX), y: Math.min(startY, currentY),
            w: Math.abs(currentX - startX), h: Math.abs(currentY - startY)
          });
        };

        const onMouseUp = () => {
          cropStartRef.current = null;
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseup', onMouseUp);
        };
        window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp);
      };

      const applyCropAndResize = () => {
        if (cropRect.w <= 0 || cropRect.h <= 0) { setIsCropMode(false); return; }
        isRestoring.current = true;
        const newFrames = frames.map(f => {
          const c = document.createElement('canvas'); c.width = Math.round(cropRect.w); c.height = Math.round(cropRect.h);
          const ctx = c.getContext('2d');
          ctx.drawImage(f.canvas, -Math.round(cropRect.x), -Math.round(cropRect.y));
          return { ...f, canvas: c };
        });
        setFrames(newFrames); setIsCropMode(false); chromaCache.current = { bgStateStr: '', canvases: [] };
        pushInitialState(newFrames); setTimeout(() => { isRestoring.current = false; }, 50);
      };

      // 播放循環
      useEffect(() => {
        if (!isPlaying || frames.length <= 1) return;
        let animationId; let lastTime = performance.now(); let accumulatedTime = 0;

        const loop = (timestamp) => {
          accumulatedTime += (timestamp - lastTime); lastTime = timestamp; let frameChanged = false;
          let targetDelay = frames[currentFrameIndexRef.current].delay / speed;

          while (accumulatedTime >= targetDelay) {
            accumulatedTime -= targetDelay; const nextIndex = currentFrameIndexRef.current + 1;
            
            if (nextIndex >= frames.length) {
              if (isLooping) currentFrameIndexRef.current = 0;
              else { currentFrameIndexRef.current = frames.length - 1; setIsPlaying(false); setCurrentFrameIndex(frames.length - 1); return; }
            } else currentFrameIndexRef.current = nextIndex;
            
            targetDelay = frames[currentFrameIndexRef.current].delay / speed; frameChanged = true;
          }

          if (frameChanged) setCurrentFrameIndex(currentFrameIndexRef.current);
          if (isPlaying) animationId = requestAnimationFrame(loop);
        };
        animationId = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(animationId);
      }, [isPlaying, frames, speed, isLooping]);

      // 計算最終合併濾鏡供畫面顯示
      const getFinalRenderFilters = useCallback((allFrames, index) => {
        const raw = getRawInterpolatedFilters(allFrames, index);
        return {
          opacity: Math.max(0, Math.min(1, globalOpacity * raw.opacity)),
          filterString: `hue-rotate(${globalHue + raw.hue}deg) saturate(${Math.max(0, (globalSaturation * raw.saturation) / 100)}%) brightness(${Math.max(0, (globalBrightness * raw.brightness) / 100)}%) contrast(${Math.max(0, (globalContrast * raw.contrast) / 100)}%) invert(${Math.min(100, Math.max(0, globalInvert + raw.invert))}%)`,
          rotate: raw.rotate || 0,
          translateX: raw.translateX || 0,
          translateY: raw.translateY || 0
        };
      }, [getRawInterpolatedFilters, globalOpacity, globalHue, globalSaturation, globalBrightness, globalContrast, globalInvert]);

      // 渲染至主畫面
      useEffect(() => {
        if (frames.length > 0 && canvasRef.current) {
          const ctx = canvasRef.current.getContext('2d');
          const frame = frames[currentFrameIndex];
          const w = frame.canvas.width; const h = frame.canvas.height;
          
          if (canvasRef.current.width !== w) canvasRef.current.width = w;
          if (canvasRef.current.height !== h) canvasRef.current.height = h;
          
          let processedChromaCanvas = frame.canvas;
          if (bgRemoval.type !== 'none') {
            const bgStateStr = JSON.stringify(bgRemoval);
            if (chromaCache.current.bgStateStr !== bgStateStr || chromaCache.current.canvases.length !== frames.length) {
              chromaCache.current.bgStateStr = bgStateStr;
              chromaCache.current.canvases = frames.map(f => applyChromaKey(f.canvas, bgRemoval));
            }
            processedChromaCanvas = chromaCache.current.canvases[currentFrameIndex];
          }
          
          const { opacity, filterString, rotate, translateX, translateY } = getFinalRenderFilters(frames, currentFrameIndex);
          
          ctx.clearRect(0, 0, w, h); ctx.save();
          ctx.globalAlpha = opacity; ctx.filter = filterString;
          ctx.translate(w/2 + translateX, h/2 + translateY); ctx.rotate((rotate * Math.PI) / 180); ctx.translate(-w/2, -h/2);
          ctx.drawImage(processedChromaCanvas, 0, 0); ctx.restore();
        }
      }, [frames, currentFrameIndex, globalOpacity, globalHue, globalSaturation, globalBrightness, globalContrast, globalInvert, bgRemoval, getFinalRenderFilters]);

      // 自由拖曳/點擊時間軸
      const handleTimelineMouseDown = (e) => {
        if (e.target.closest('.keyframe-diamond')) return; 
        if (!timelineTrackRef.current) return;
        setIsPlaying(false);
        const rect = timelineTrackRef.current.getBoundingClientRect();
        
        const updateFrame = (clientX) => {
          const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
          const idx = Math.round(ratio * (frames.length - 1));
          setCurrentFrameIndex(idx); setSelectedEditFrame(idx);
        };
        updateFrame(e.clientX);
        
        const onMouseMove = (moveEvent) => updateFrame(moveEvent.clientX);
        const onMouseUp = () => { window.removeEventListener('mousemove', onMouseMove); window.removeEventListener('mouseup', onMouseUp); };
        window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp);
      };

      // 拖曳單一軌道的關鍵影格
      const handleKeyframeDrag = (e, fromIdx, trackId) => {
        e.preventDefault(); e.stopPropagation();
        const container = timelineTrackRef.current;
        if(!container) return;

        const onMouseUp = (upEvent) => {
            const rect = container.getBoundingClientRect();
            const dropRatio = Math.max(0, Math.min(1, (upEvent.clientX - rect.left) / rect.width));
            const toIdx = Math.round(dropRatio * (frames.length - 1));
            
            if (fromIdx !== toIdx) {
                isRestoring.current = true;
                setFrames(prev => {
                    const newF = prev.map(f => ({ ...f, customFilters: {...f.customFilters}, keyframes: {...f.keyframes}, easings: {...f.easings} }));
                    newF[toIdx].keyframes[trackId] = true;
                    TRACK_PROPS[trackId].forEach(p => { newF[toIdx].customFilters[p] = newF[fromIdx].customFilters[p]; });
                    newF[toIdx].easings[trackId] = newF[fromIdx].easings[trackId];

                    newF[fromIdx].keyframes[trackId] = false;
                    return newF;
                });
                setCurrentFrameIndex(toIdx); setSelectedEditFrame(toIdx);
                setTimeout(() => { isRestoring.current = false; }, 50);
            }
            window.removeEventListener('mouseup', onMouseUp);
        };
        window.addEventListener('mouseup', onMouseUp);
      };

      const updateFrameFilter = (key, value) => {
        setFrames(prevFrames => {
          const newFrames = [...prevFrames];
          const track = Object.keys(TRACK_PROPS).find(t => TRACK_PROPS[t].includes(key));
          
          if (!newFrames[selectedEditFrame].keyframes[track]) {
             const rawInterpolated = getRawInterpolatedFilters(prevFrames, selectedEditFrame);
             newFrames[selectedEditFrame].customFilters = { ...newFrames[selectedEditFrame].customFilters };
             TRACK_PROPS[track].forEach(p => {
                 newFrames[selectedEditFrame].customFilters[p] = rawInterpolated[p];
             });
             newFrames[selectedEditFrame].keyframes = { ...newFrames[selectedEditFrame].keyframes, [track]: true };
          }
          newFrames[selectedEditFrame].customFilters[key] = value;
          return newFrames;
        });
      };

      // 時間軸 SVG 曲線繪製 (支援多軌道)
      const renderTimelineCurves = (trackId, strokeColor) => {
        const keyframesData = frames.map((f, i) => ({ frame: f, idx: i })).filter(k => k.frame.keyframes[trackId]);
        if (keyframesData.length < 2) return null;

        const paths = [];
        for (let i = 0; i < keyframesData.length - 1; i++) {
            const k1 = keyframesData[i]; const k2 = keyframesData[i + 1];
            const x1 = (k1.idx / (frames.length - 1)) * 100; const x2 = (k2.idx / (frames.length - 1)) * 100;
            const y = 50; 
            paths.push(<path key={i} d={`M ${x1} ${y} L ${x2} ${y}`} fill="none" stroke={strokeColor} strokeWidth="1.5" vectorEffect="non-scaling-stroke" />);
        }
        return paths;
      };

      // 匯出與預估大小
      const getEstimatedSize = () => {
        if (frames.length === 0) return 0;
        const rawBytes = frames[0].canvas.width * frames[0].canvas.height * 4 * frames.length;
        let multiplier = compressionLevel === 256 ? 0.05 : compressionLevel === 128 ? 0.035 : compressionLevel === 64 ? 0.025 : 0.15;
        return rawBytes * multiplier;
      };

      const formatBytes = (bytes) => {
        if (bytes === 0) return '0 B'; const k = 1024; const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k)); return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
      };

      const getExportCanvasForFrame = (index) => {
        const frame = frames[index]; const w = frame.canvas.width; const h = frame.canvas.height;
        const tempCanvas = document.createElement('canvas'); tempCanvas.width = w; tempCanvas.height = h;
        const ctx = tempCanvas.getContext('2d');
        const processedChromaCanvas = (bgRemoval.type !== 'none' && chromaCache.current.canvases[index]) ? chromaCache.current.canvases[index] : frame.canvas;
        const { opacity, filterString, rotate, translateX, translateY } = getFinalRenderFilters(frames, index);
        
        ctx.globalAlpha = opacity; ctx.filter = filterString;
        ctx.translate(w/2 + translateX, h/2 + translateY); ctx.rotate((rotate * Math.PI) / 180); ctx.translate(-w/2, -h/2);
        ctx.drawImage(processedChromaCanvas, 0, 0);
        return { canvas: tempCanvas, ctx, w, h };
      };

      const handleDownloadAnimation = async () => {
        if (!isAppReady || frames.length === 0) return;
        setIsExporting(true);
        try {
          await new Promise(resolve => setTimeout(resolve, 50));
          const imgs = []; const delays = []; const w = frames[0].canvas.width; const h = frames[0].canvas.height;
          for (let i = 0; i < frames.length; i++) {
            const { ctx } = getExportCanvasForFrame(i);
            imgs.push(ctx.getImageData(0, 0, w, h).data.buffer); delays.push(frames[i].delay / speed);
          }
          let apngBuffer = UPNG.encode(imgs, w, h, compressionLevel, delays);

          // 根據是否循環修改 APNG 播放次數 (修改 acTL chunk)
          if (!isLooping) {
             const crcTable = new Uint32Array(256);
             for (let i = 0; i < 256; i++) {
                let c = i;
                for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                crcTable[i] = c;
             }
             const crc32 = (buf, off, len) => {
                let crc = 0 ^ (-1);
                for (let i = 0; i < len; i++) crc = (crc >>> 8) ^ crcTable[(crc ^ buf[off + i]) & 0xFF];
                return (crc ^ (-1)) >>> 0;
             };

             const view = new DataView(apngBuffer);
             const uint8 = new Uint8Array(apngBuffer);
             const length = view.byteLength;
             let offset = 8;
             while (offset < length) {
                const chunkLen = view.getUint32(offset);
                const chunkType = String.fromCharCode(uint8[offset+4], uint8[offset+5], uint8[offset+6], uint8[offset+7]);
                if (chunkType === 'acTL') {
                   // 修改播放次數為 1 (只播放一次)
                   view.setUint32(offset + 12, 1); 
                   // 重算 acTL 的 CRC (範圍包含 Type 和 Data)
                   const newCrc = crc32(uint8, offset + 4, chunkLen + 4);
                   view.setUint32(offset + 8 + chunkLen, newCrc);
                   break;
                }
                offset += 8 + chunkLen + 4;
             }
          }

          const blob = new Blob([apngBuffer], { type: 'image/apng' });
          const url = URL.createObjectURL(blob); 
          const a = document.createElement('a'); 
          a.href = url; 
          a.download = `${originalFileName}_apng.png`; 
          a.click();
          URL.revokeObjectURL(url);
        } catch (e) { setError("匯出失敗。"); } finally { setIsExporting(false); }
      };

      const handleDownloadZip = async () => {
        if (!isAppReady || frames.length === 0) return;
        setIsExporting(true);
        try {
          await new Promise(resolve => setTimeout(resolve, 50));
          const zipData = {};
          for (let i = 0; i < frames.length; i++) {
            const { canvas } = getExportCanvasForFrame(i);
            const buffer = await new Promise(resolve => {
              canvas.toBlob(blob => {
                const reader = new FileReader();
                reader.onload = () => resolve(new Uint8Array(reader.result));
                reader.readAsArrayBuffer(blob);
              }, 'image/png');
            });
            const idxStr = String(i + 1).padStart(3, '0');
            zipData[`frame_${idxStr}.png`] = buffer;
          }
          const zipped = fflate.zipSync(zipData);
          const blob = new Blob([zipped], { type: 'application/zip' });
          const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; 
          a.download = `${originalFileName}_frames.zip`; 
          a.click();
          URL.revokeObjectURL(url);
        } catch (e) { setError("打包影格失敗。"); } finally { setIsExporting(false); }
      };

      return (
        <div className="flex flex-col h-screen bg-slate-50 text-slate-900 font-sans overflow-hidden select-none">
          {/* Header */}
          <header className="px-6 py-4 border-b border-slate-200 bg-white flex items-center justify-between shrink-0 shadow-sm z-10">
            <h1 className="text-xl font-bold flex items-center gap-2 text-slate-800">
              <ImageIcon className="w-6 h-6 text-blue-600" />動態影像編輯器
            </h1>
            {frames.length > 0 && (
              <div className="flex items-center gap-3">
                {!isCropMode && (
                  <button onClick={() => { setIsCropMode(true); setIsPlaying(false); setCropRect({x:0, y:0, w:frames[0].canvas.width, h:frames[0].canvas.height}); }} className="flex items-center gap-1 text-sm bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-md font-medium transition-colors">
                    <Crop className="w-4 h-4"/> 裁切/擴展
                  </button>
                )}
                <div className="flex items-center gap-1 border-x border-slate-200 px-3 mx-2">
                  <button onClick={undo} disabled={historyPointer <= 0} className="p-1.5 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-md transition-colors disabled:opacity-30"><Undo2 className="w-4 h-4" /></button>
                  <button onClick={redo} disabled={historyPointer >= history.length - 1} className="p-1.5 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-md transition-colors disabled:opacity-30"><Redo2 className="w-4 h-4" /></button>
                </div>
                <button onClick={() => { setFrames([]); setIsPlaying(false); setActiveTab('global'); setHistory([]); setHistoryPointer(-1); chromaCache.current = {bgStateStr:'', canvases:[]}; }} className="text-sm text-slate-500 hover:text-red-500 transition-colors font-medium px-3 py-1 rounded-md hover:bg-red-50">清除</button>
              </div>
            )}
          </header>

          <main className="flex-1 flex overflow-hidden flex-col md:flex-row relative">
            {(isLoading || isExporting || !isAppReady) && (
              <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p className="mt-4 text-blue-700 font-bold text-lg shadow-white drop-shadow-md">處理中，請稍候...</p>
              </div>
            )}

            {/* 左側：畫布與專業時間軸 */}
            <div className="flex-1 flex flex-col min-w-0 bg-slate-100">
              
              {/* Canvas Area */}
              <div className={`flex-1 relative flex items-center justify-center p-4 md:p-8 checkered-bg-light overflow-hidden`} onDragOver={(e) => e.preventDefault()} onDrop={onDrop}>
                {error && (<div className="absolute top-8 left-1/2 transform -translate-x-1/2 bg-red-100 text-red-700 px-4 py-3 rounded-lg flex items-center gap-2 shadow-md z-40 border border-red-200 text-sm"><AlertCircle className="w-5 h-5" /> {error}</div>)}

                {frames.length > 0 ? (
                  <div className="relative w-full h-full flex items-center justify-center pointer-events-none">
                    <canvas ref={canvasRef} className="max-w-full max-h-full object-contain drop-shadow-xl pointer-events-auto" />
                    
                    {/* 裁切覆蓋層 (Crop Overlay) */}
                    {isCropMode && (
                      <div 
                        ref={overlayRef}
                        className="absolute inset-0 z-30 cursor-crosshair pointer-events-auto"
                        onMouseDown={handleCropMouseDown}
                      >
                        <div className="absolute bg-blue-500/20 border-2 border-blue-500 shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]" 
                             style={{
                               left: `${cropRect.x * (overlayRef.current ? overlayRef.current.getBoundingClientRect().width / frames[0].canvas.width : 1)}px`, 
                               top: `${cropRect.y * (overlayRef.current ? overlayRef.current.getBoundingClientRect().height / frames[0].canvas.height : 1)}px`, 
                               width: `${cropRect.w * (overlayRef.current ? overlayRef.current.getBoundingClientRect().width / frames[0].canvas.width : 1)}px`, 
                               height: `${cropRect.h * (overlayRef.current ? overlayRef.current.getBoundingClientRect().height / frames[0].canvas.height : 1)}px`
                             }}
                        >
                          <div className="absolute -top-1 -left-1 w-2 h-2 bg-white border border-blue-600"></div><div className="absolute -top-1 -right-1 w-2 h-2 bg-white border border-blue-600"></div>
                          <div className="absolute -bottom-1 -left-1 w-2 h-2 bg-white border border-blue-600"></div><div className="absolute -bottom-1 -right-1 w-2 h-2 bg-white border border-blue-600"></div>
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className={`border-2 border-dashed border-slate-300 rounded-3xl p-8 md:p-16 text-center bg-white/60 shadow-sm w-full max-w-lg cursor-pointer hover:border-blue-500 hover:bg-blue-50/50`} onClick={() => isAppReady && document.getElementById('file-upload').click()}>
                    <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6"><Upload className="w-8 h-8 text-blue-600" /></div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-2">匯入圖片 / 動畫</h2>
                    <p className="text-slate-500">拖曳檔案至此或點擊選擇</p>
                  </div>
                )}

                {/* 裁切/擴展控制面板 */}
                {isCropMode && (
                  <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-white p-4 rounded-xl shadow-2xl z-40 border border-slate-200 flex items-center gap-4">
                    <div className="flex gap-2">
                      <div className="flex flex-col"><label className="text-[10px] text-slate-500">X</label><input type="number" value={Math.round(cropRect.x)} onChange={(e)=>setCropRect({...cropRect, x: Number(e.target.value)})} className="w-16 border rounded p-1 text-sm"/></div>
                      <div className="flex flex-col"><label className="text-[10px] text-slate-500">Y</label><input type="number" value={Math.round(cropRect.y)} onChange={(e)=>setCropRect({...cropRect, y: Number(e.target.value)})} className="w-16 border rounded p-1 text-sm"/></div>
                      <div className="flex flex-col"><label className="text-[10px] text-slate-500">寬度(W)</label><input type="number" value={Math.round(cropRect.w)} onChange={(e)=>setCropRect({...cropRect, w: Number(e.target.value)})} className="w-16 border rounded p-1 text-sm"/></div>
                      <div className="flex flex-col"><label className="text-[10px] text-slate-500">高度(H)</label><input type="number" value={Math.round(cropRect.h)} onChange={(e)=>setCropRect({...cropRect, h: Number(e.target.value)})} className="w-16 border rounded p-1 text-sm"/></div>
                    </div>
                    
                    <div className="flex flex-col gap-1 border-l pl-4 justify-center items-center">
                      <span className="text-[10px] text-slate-500 font-bold mb-1">對齊方式</span>
                      <div className="flex gap-1 bg-slate-100 p-1 rounded-lg">
                        <button onClick={() => alignCropRect('left')} className="p-1 hover:bg-white rounded hover:text-blue-600 transition-colors shadow-sm" title="靠左"><AlignLeft className="w-4 h-4"/></button>
                        <button onClick={() => alignCropRect('center')} className="p-1 hover:bg-white rounded hover:text-blue-600 transition-colors shadow-sm" title="置中"><AlignCenter className="w-4 h-4"/></button>
                        <button onClick={() => alignCropRect('right')} className="p-1 hover:bg-white rounded hover:text-blue-600 transition-colors shadow-sm" title="靠右"><AlignRight className="w-4 h-4"/></button>
                      </div>
                    </div>

                    <div className="flex flex-col gap-1 border-l pl-4">
                      <button onClick={applyCropAndResize} className="px-4 py-1.5 bg-blue-600 text-white rounded text-sm font-bold hover:bg-blue-700 shadow-sm">確認裁切/擴展</button>
                      <button onClick={()=>setIsCropMode(false)} className="px-4 py-1 bg-slate-100 text-slate-600 rounded text-xs hover:bg-slate-200">取消</button>
                    </div>
                  </div>
                )}
              </div>

              {/* ===== 多軌道 AE Style 關鍵影格時間軸 ===== */}
              {frames.length > 1 && !isCropMode && (
                <div className="h-[150px] bg-[#f8f9fa] border-t border-slate-200 shrink-0 flex flex-col shadow-[0_-4px_15px_-3px_rgba(0,0,0,0.05)] z-20 select-none relative overflow-y-auto custom-scrollbar">
                  
                  {/* 上方：影格數字標尺 */}
                  <div className="h-6 border-b border-slate-200 flex relative overflow-hidden px-12 bg-white sticky top-0 z-30">
                    {Array.from({ length: Math.ceil(frames.length / 10) + 1 }).map((_, i) => {
                      const frameNum = i * 10;
                      if (frameNum >= frames.length) return null;
                      return (
                        <div key={i} className="absolute top-0 bottom-0 border-l border-slate-300 flex items-end pb-0.5" style={{ left: `calc(3rem + ${(frameNum / (frames.length - 1)) * 100}%)` }}>
                          <span className="text-[10px] text-slate-400 font-mono ml-1 leading-none">{frameNum}</span>
                        </div>
                      )
                    })}
                  </div>

                  {/* 下方：多軌道區塊 */}
                  <div className="flex-1 relative px-12 py-2 flex flex-col gap-1" ref={timelineTrackRef} onMouseDown={handleTimelineMouseDown}>
                    
                    {/* 紅色播放指標 (貫穿所有軌道) */}
                    <div className="absolute top-0 bottom-0 w-px bg-red-500 z-20 pointer-events-none" style={{ left: `calc(3rem + ${(currentFrameIndex / (frames.length - 1)) * 100}%)` }}>
                      <div className="absolute top-0 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[5px] border-l-transparent border-r-[5px] border-r-transparent border-t-[7px] border-t-red-500"></div>
                    </div>

                    {/* 映射每一個軌道 */}
                    {TRACKS_INFO.map(track => (
                      <div key={track.id} className="relative h-6 bg-slate-200/50 rounded-sm border border-slate-300 flex items-center">
                        <span className="absolute -left-10 text-[9px] text-slate-500 font-bold">{track.label}</span>
                        
                        {/* SVG 曲線連線 */}
                        <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
                          {renderTimelineCurves(track.id, track.stroke)}
                        </svg>

                        {/* 關鍵影格菱形 */}
                        {frames.map((frame, idx) => {
                          if (!frame.keyframes[track.id]) return null;
                          const isSelected = selectedEditFrame === idx;
                          return (
                            <div 
                              key={idx} 
                              className={`absolute top-1/2 -mt-1.5 w-3 h-3 rotate-45 transform -translate-x-1/2 cursor-grab active:cursor-grabbing hover:scale-125 transition-transform z-10 
                                ${isSelected ? 'bg-orange-500 border border-orange-700 shadow-[0_0_5px_rgba(249,115,22,0.8)]' : `${track.color} border ${track.border} shadow-sm`}`}
                              style={{ left: `${(idx / (frames.length - 1)) * 100}%` }}
                              onMouseDown={(e) => {
                                 setSelectedEditFrame(idx); setCurrentFrameIndex(idx); setIsPlaying(false); setActiveTab('frame');
                                 handleKeyframeDrag(e, idx, track.id);
                              }}
                              title={`第 ${idx} 格 ${track.label}特效`}
                            />
                          );
                        })}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* 右側：控制面板 */}
            {frames.length > 0 && !isCropMode && (
              <div className="w-full md:w-[380px] bg-white border-t md:border-t-0 md:border-l border-slate-200 flex flex-col shrink-0 h-1/2 md:h-full z-10 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)]">
                
                {/* 置頂播放控制 */}
                {frames.length > 1 && (
                  <div className="p-4 border-b border-slate-200 bg-slate-50 shrink-0 space-y-3">
                    <div className="flex items-center justify-between">
                      <h2 className="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1">總體控制 <span className="text-slate-400 font-normal lowercase">(空白鍵)</span></h2>
                      <label className="flex items-center gap-1.5 cursor-pointer group">
                        <div className={`relative w-8 h-4 rounded-full transition-colors ${isLooping ? 'bg-blue-500' : 'bg-slate-300'}`}><div className={`absolute top-0.5 left-0.5 bg-white w-3 h-3 rounded-full transition-transform ${isLooping ? 'translate-x-4' : 'translate-x-0'}`}></div></div>
                        <span className="text-xs font-medium text-slate-600">循環</span>
                        <input type="checkbox" className="hidden" checked={isLooping} onChange={() => setIsLooping(!isLooping)} />
                      </label>
                    </div>
                    <div className="flex items-center gap-3">
                      <button onClick={() => { if (!isPlaying && currentFrameIndex >= frames.length - 1) setCurrentFrameIndex(0); setIsPlaying(!isPlaying); }} className={`w-10 h-10 flex items-center justify-center rounded-full transition-all flex-shrink-0 shadow-md ${isPlaying ? 'bg-slate-800 text-white' : 'bg-blue-600 text-white'}`}>
                        {isPlaying ? <Pause className="w-4 h-4 fill-current" /> : <Play className="w-4 h-4 ml-1 fill-current" />}
                      </button>
                      <FilterSliderWithInput value={speed} min={0.1} max={5.0} step={0.1} onChange={setSpeed} />
                      <span className="text-xs font-bold text-slate-500 ml-1">倍速</span>
                    </div>
                  </div>
                )}

                {/* 分頁按鈕 */}
                <div className="flex border-b border-slate-200 bg-slate-50 shrink-0">
                  {frames.length === 1 && (<button onClick={() => setActiveTab('convert')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 transition-colors ${activeTab === 'convert' ? 'text-blue-600 bg-white border-b-2 border-blue-600' : 'text-slate-500 hover:bg-slate-100 border-b-2 border-transparent'}`}><Wand2 className="w-4 h-4" /> 轉換動圖</button>)}
                  {frames.length > 1 && (
                    <>
                      <button onClick={() => setActiveTab('global')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 transition-colors ${activeTab === 'global' ? 'text-blue-600 bg-white border-b-2 border-blue-600' : 'text-slate-500 hover:bg-slate-100 border-b-2 border-transparent'}`}><Globe className="w-4 h-4" /> 全域</button>
                      <button onClick={() => setActiveTab('gradient')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 transition-colors ${activeTab === 'gradient' ? 'text-purple-600 bg-white border-b-2 border-purple-600' : 'text-slate-500 hover:bg-slate-100 border-b-2 border-transparent'}`}><Sparkles className="w-4 h-4" /> 漸變</button>
                      <button onClick={() => { setActiveTab('frame'); setIsPlaying(false); }} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 transition-colors ${activeTab === 'frame' ? 'text-blue-600 bg-white border-b-2 border-blue-600' : 'text-slate-500 hover:bg-slate-100 border-b-2 border-transparent'}`}><Layers className="w-4 h-4" /> 單格</button>
                    </>
                  )}
                </div>

                {/* 分頁內容 */}
                <div className="p-5 flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-6 bg-white">
                  
                  {/* ====== 轉換分頁 ====== */}
                  {activeTab === 'convert' && frames.length === 1 && (
                    <section className="bg-blue-50 border border-blue-100 rounded-xl p-4">
                      <h2 className="text-sm font-bold text-blue-800 mb-3">設定動圖長度</h2>
                      <div className="flex flex-col gap-4">
                        <div>
                          <label className="text-xs font-bold text-blue-700 mb-1 block">自動生成特效</label>
                          <select value={convertEffect} onChange={(e) => setConvertEffect(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-blue-200 text-sm">
                            <option value="none">無 (純複製延伸)</option>
                            <option value="hue">🌈 色彩循環</option>
                            <option value="pulse">✨ 呼吸閃爍</option>
                            <option value="spin">🌀 360度旋轉</option>
                            <option value="zoom">🔍 縮放跳動</option>
                          </select>
                        </div>
                        <div>
                          <div className="flex justify-between text-xs mb-1 font-bold text-blue-700"><label>長度 (秒)</label></div>
                          <FilterSliderWithInput value={targetSeconds} min={0.5} max={30} step={0.5} onChange={setTargetSeconds} />
                        </div>
                        <button onClick={convertToAnimation} className="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold shadow-sm">開始轉換</button>
                      </div>
                    </section>
                  )}

                  {/* ====== 全域分頁 ====== */}
                  {activeTab === 'global' && frames.length > 1 && (
                    <div className="space-y-6">
                      <section>
                        <h2 className="text-xs font-bold text-slate-500 uppercase mb-3"><Eraser className="w-3 h-3 inline mr-1"/> 去背功能</h2>
                        <div className="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                          <select value={bgRemoval.type} onChange={(e) => setBgRemoval({...bgRemoval, type: e.target.value})} className="w-full px-2 py-1.5 rounded-md border border-slate-200 text-sm">
                            <option value="none">無 (不處理)</option>
                            <option value="green">去除綠幕 (Green)</option><option value="black">去除純黑 (Black)</option>
                            <option value="white">去除純白 (White)</option><option value="custom">自訂顏色</option>
                          </select>
                          {bgRemoval.type === 'custom' && <input type="color" value={bgRemoval.color} onChange={(e) => setBgRemoval({...bgRemoval, color: e.target.value})} className="w-full h-8" />}
                          {bgRemoval.type !== 'none' && (
                             <div><label className="text-[10px] text-slate-500">容差</label><FilterSliderWithInput value={bgRemoval.tolerance} min={0} max={200} onChange={(v)=>setBgRemoval({...bgRemoval, tolerance: v})} /></div>
                          )}
                        </div>
                      </section>
                      <section>
                        <h2 className="text-xs font-bold text-slate-500 uppercase mb-3"><SlidersHorizontal className="w-3 h-3 inline mr-1"/> 全域濾鏡</h2>
                        <div className="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                          <div><label className="text-[10px] font-bold">透明度 (%)</label><FilterSliderWithInput value={globalOpacity * 100} min={0} max={100} onChange={v => setGlobalOpacity(v / 100)} /></div>
                          <div><label className="text-[10px] font-bold">色相 (°)</label><FilterSliderWithInput value={globalHue} min={0} max={360} onChange={setGlobalHue} /></div>
                          <div><label className="text-[10px] font-bold">飽和度 (%)</label><FilterSliderWithInput value={globalSaturation} min={0} max={200} onChange={setGlobalSaturation} /></div>
                          <div><label className="text-[10px] font-bold">對比度 (%)</label><FilterSliderWithInput value={globalContrast} min={0} max={200} onChange={setGlobalContrast} /></div>
                          <div><label className="text-[10px] font-bold">負片 (%)</label><FilterSliderWithInput value={globalInvert} min={0} max={100} onChange={setGlobalInvert} /></div>
                        </div>
                      </section>
                    </div>
                  )}

                  {/* ====== 漸變分頁 ====== */}
                  {activeTab === 'gradient' && frames.length > 1 && (
                    <div className="space-y-4 animate-fade-in">
                      <div className="bg-purple-50 text-purple-700 p-2 rounded text-[11px] font-medium flex justify-between items-center shadow-sm">
                        <span>拉動數值即時套用變化 (Live)</span>
                        {frames.length > 0 && <span className="font-mono bg-white px-1.5 py-0.5 border border-purple-200 rounded text-slate-600 shadow-sm">{frames[0].canvas.width}x{frames[0].canvas.height} px</span>}
                      </div>

                      <div className="flex items-center justify-between px-1 border-b pb-2 border-slate-200">
                        <span className="text-[11px] font-bold text-slate-600">漸變曲線 (Easing)</span>
                        <select value={gradEasing} onChange={(e) => setGradEasing(e.target.value)} className="px-2 py-1 rounded border border-slate-300 text-[11px] focus:outline-none font-bold text-purple-700 bg-white">
                          <option value="linear">線性 (Linear)</option>
                          <option value="easeIn">漸快 (Ease In)</option>
                          <option value="easeOut">漸慢 (Ease Out)</option>
                          <option value="easeInOut">平滑 (Ease In Out)</option>
                        </select>
                      </div>

                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4 shadow-sm">
                        <div className="flex gap-2 mb-2 p-1 bg-slate-200/50 rounded-lg">
                           <button onClick={()=>setGradType('opacity')} className={`flex-1 py-1.5 text-[11px] font-bold rounded-md shadow-sm transition-all ${gradType==='opacity'?'bg-white text-purple-700 border border-purple-200':'text-slate-500 hover:bg-slate-200'}`}>透明度</button>
                           <button onClick={()=>setGradType('rotate')} className={`flex-1 py-1.5 text-[11px] font-bold rounded-md shadow-sm transition-all ${gradType==='rotate'?'bg-white text-purple-700 border border-purple-200':'text-slate-500 hover:bg-slate-200'}`}>旋轉</button>
                           <button onClick={()=>setGradType('translate')} className={`flex-1 py-1.5 text-[11px] font-bold rounded-md shadow-sm transition-all ${gradType==='translate'?'bg-white text-purple-700 border border-purple-200':'text-slate-500 hover:bg-slate-200'}`}>位移</button>
                        </div>

                        {gradType === 'opacity' && (
                          <div className="space-y-4 animate-fade-in">
                            <div><label className="text-[10px] font-bold text-slate-600 mb-1 block">目標透明度 (%)</label><FilterSliderWithInput value={gradOpacityTarget} min={0} max={100} onChange={setGradOpacityTarget} /></div>
                            <div className="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-200">
                              <button onClick={() => triggerExplicitGradient('opacity_fadeTo')} className="py-2 bg-white border border-slate-300 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 hover:text-purple-600 transition-colors">100% 淡出至目標</button>
                              <button onClick={() => triggerExplicitGradient('opacity_fadeFrom')} className="py-2 bg-white border border-slate-300 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 hover:text-purple-600 transition-colors">目標 淡入至 100%</button>
                              <button onClick={() => triggerExplicitGradient('opacity_pulse')} className="col-span-2 py-2 bg-white border border-slate-300 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 hover:text-purple-600 transition-colors">呼吸閃爍 (100% -> 目標 -> 100%)</button>
                            </div>
                          </div>
                        )}

                        {gradType === 'rotate' && (
                          <div className="space-y-4 animate-fade-in">
                            <div><label className="text-[10px] font-bold text-slate-600 mb-1 block">起點角度 (°)</label><FilterSliderWithInput value={gradRotStart} min={-360} max={360} onChange={setGradRotStart} /></div>
                            <div><label className="text-[10px] font-bold text-slate-600 mb-1 block">終點角度 (°)</label><FilterSliderWithInput value={gradRotEnd} min={-360} max={360} onChange={setGradRotEnd} /></div>
                            
                            <div className="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-200">
                               <button onClick={() => { setGradRotStart(0); setGradRotEnd(360); triggerExplicitGradient('rotate'); }} className="py-2 bg-white border border-slate-300 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 hover:text-purple-600 transition-colors">順時針一圈</button>
                               <button onClick={() => { setGradRotStart(0); setGradRotEnd(-360); triggerExplicitGradient('rotate'); }} className="py-2 bg-white border border-slate-300 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 hover:text-purple-600 transition-colors">逆時針一圈</button>
                            </div>
                          </div>
                        )}

                        {gradType === 'translate' && (
                          <div className="space-y-4 animate-fade-in">
                            <div><label className="text-[10px] font-bold text-slate-600 mb-1 block">X 軸 終點偏移 (px) - <span className="text-purple-500">起點預設為 0</span></label><FilterSliderWithInput value={gradMoveEndX} min={-2000} max={2000} onChange={setGradMoveEndX} /></div>
                            <div className="border-t border-slate-200"></div>
                            <div><label className="text-[10px] font-bold text-slate-600 mb-1 block">Y 軸 終點偏移 (px) - <span className="text-purple-500">起點預設為 0</span></label><FilterSliderWithInput value={gradMoveEndY} min={-2000} max={2000} onChange={setGradMoveEndY} /></div>

                            <div className="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-200">
                               <button onClick={() => handleQuickMove('right')} className="py-2 bg-white border border-slate-300 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 hover:text-purple-600 transition-colors">向右移出畫布</button>
                               <button onClick={() => handleQuickMove('left')} className="py-2 bg-white border border-slate-300 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 hover:text-purple-600 transition-colors">向左移出畫布</button>
                               <button onClick={() => handleQuickMove('down')} className="py-2 bg-white border border-slate-300 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 hover:text-purple-600 transition-colors">向下落出畫布</button>
                               <button onClick={() => handleQuickMove('up')} className="py-2 bg-white border border-slate-300 text-[10px] font-bold rounded-lg shadow-sm hover:border-purple-400 hover:text-purple-600 transition-colors">向上飛出畫布</button>
                            </div>
                          </div>
                        )}
                        <button onClick={() => triggerExplicitGradient(`${gradType}_reset`)} className="w-full mt-2 py-2 bg-slate-200 text-slate-600 text-xs font-bold rounded-lg hover:bg-red-100 hover:text-red-600 transition-colors">移除此軌道效果 (Reset)</button>
                      </div>
                    </div>
                  )}

                  {/* ====== 單格分頁 ====== */}
                  {activeTab === 'frame' && frames.length > 1 && (
                    <div className="space-y-4 animate-fade-in">
                      <div className="bg-blue-50 text-blue-700 p-2 rounded text-[11px] font-medium text-center border border-blue-100 shadow-sm">
                        正在編輯第 {selectedEditFrame + 1} 格
                      </div>
                      <div className="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                        <div><label className="text-[10px] font-bold text-blue-700">獨立透明度 (%)</label><FilterSliderWithInput value={frames[selectedEditFrame].customFilters.opacity * 100} min={0} max={100} onChange={(v) => updateFrameFilter('opacity', v / 100)} /></div>
                        <div><label className="text-[10px] font-bold text-blue-700">獨立旋轉 (°)</label><FilterSliderWithInput value={frames[selectedEditFrame].customFilters.rotate || 0} min={-360} max={360} onChange={(v) => updateFrameFilter('rotate', v)} /></div>
                        <div><label className="text-[10px] font-bold text-blue-700">獨立 X 偏移 (px)</label><FilterSliderWithInput value={frames[selectedEditFrame].customFilters.translateX || 0} min={-2000} max={2000} onChange={(v) => updateFrameFilter('translateX', v)} /></div>
                        <div><label className="text-[10px] font-bold text-blue-700">獨立 Y 偏移 (px)</label><FilterSliderWithInput value={frames[selectedEditFrame].customFilters.translateY || 0} min={-2000} max={2000} onChange={(v) => updateFrameFilter('translateY', v)} /></div>
                        <div className="border-t border-slate-200 my-2"></div>
                        <div><label className="text-[10px] font-bold text-orange-600">獨立負片 (%)</label><FilterSliderWithInput value={frames[selectedEditFrame].customFilters.invert || 0} min={0} max={100} onChange={(v) => updateFrameFilter('invert', v)} /></div>
                        <div><label className="text-[10px] font-bold text-orange-600">獨立色相 (°)</label><FilterSliderWithInput value={frames[selectedEditFrame].customFilters.hue} min={0} max={360} onChange={(v) => updateFrameFilter('hue', v)} /></div>
                        <div><label className="text-[10px] font-bold text-orange-600">獨立飽和度 (%)</label><FilterSliderWithInput value={frames[selectedEditFrame].customFilters.saturation} min={0} max={200} onChange={(v) => updateFrameFilter('saturation', v)} /></div>
                      </div>
                    </div>
                  )}
                </div>

                {/* 匯出面板置底 */}
                <div className="p-4 border-t border-slate-200 bg-slate-50 shrink-0">
                  {frames.length > 1 && (
                    <div className="flex items-center gap-2 mb-3">
                      <select value={compressionLevel} onChange={(e) => setCompressionLevel(parseInt(e.target.value))} className="flex-1 px-2 py-1.5 rounded border border-slate-300 text-[11px] font-medium text-slate-700 bg-white">
                        <option value={0}>高畫質(大檔)</option>
                        <option value={256}>256色(推薦)</option>
                        <option value={128}>128色(壓縮)</option>
                        <option value={64}>64色(極小)</option>
                      </select>
                      <span className="text-[10px] bg-white px-2 py-1.5 border border-slate-200 rounded font-mono text-blue-600">預估 {formatBytes(getEstimatedSize())}</span>
                    </div>
                  )}
                  <div className="flex flex-col gap-2">
                    <button onClick={handleDownloadAnimation} disabled={isExporting || frames.length === 0} className="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-bold shadow-sm flex items-center justify-center gap-2 disabled:opacity-50 transition-colors">
                      <Download className="w-4 h-4" /> 匯出 APNG
                    </button>
                    {frames.length > 1 && (
                      <button onClick={handleDownloadZip} disabled={isExporting} className="w-full py-1.5 bg-white text-slate-700 border border-slate-300 rounded text-[11px] font-bold hover:bg-slate-100 disabled:opacity-50 transition-colors">
                         打包 ZIP
                      </button>
                    )}
                  </div>
                  <input id="file-upload" type="file" accept="image/gif, image/png, image/apng" className="hidden" disabled={!isAppReady} onChange={onFileChange} />
                </div>
              </div>
            )}
          </main>

          <style dangerouslySetInnerHTML={{__html: `
            .checkered-bg-light {
              background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
              background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; background-color: #f8fafc;
            }
            .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
            .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
            input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
          `}} />
        </div>
      );
    }

    // 結合 Range 與 Number 雙向綁定的 UI 元件 (修正數字輸入問題)
    function FilterSliderWithInput({ value, min, max, step = 1, onChange }) {
      const isFloat = !Number.isInteger(step);
      const [localVal, setLocalVal] = React.useState(isFloat ? Number(value).toFixed(1) : Math.round(value));
      const [isEditing, setIsEditing] = React.useState(false);

      React.useEffect(() => {
        if (!isEditing) {
          setLocalVal(isFloat ? Number(value).toFixed(1) : Math.round(value));
        }
      }, [value, isFloat, isEditing]);

      const handleInputChange = (e) => {
        setLocalVal(e.target.value);
      };
      
      const handleBlur = () => {
        setIsEditing(false);
        let val = parseFloat(localVal);
        if (isNaN(val)) val = value;
        val = Math.max(min, Math.min(max, val));
        onChange(val);
        setLocalVal(isFloat ? Number(val).toFixed(1) : Math.round(val));
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') e.target.blur();
      };

      return (
        <div className="flex items-center gap-3">
          <input type="range" min={min} max={max} step={step} value={value} onChange={(e) => onChange(parseFloat(e.target.value))} className="flex-1 accent-blue-500 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
          <input type="number" step={step} value={isEditing ? localVal : (isFloat ? Number(value).toFixed(1) : Math.round(value))} onChange={handleInputChange} onFocus={() => setIsEditing(true)} onBlur={handleBlur} onKeyDown={handleKeyDown} className="w-[52px] px-1 py-1 text-[11px] text-right border border-slate-300 rounded font-mono text-slate-700 focus:outline-none focus:border-blue-500 shrink-0" />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
